# FILE: configuration.yaml
default_config:

recorder:
  purge_keep_days: 90
  auto_purge: true

frontend:
  themes: !include_dir_merge_named themes

homeassistant:
  packages: !include_dir_named packages


lovelace:
  resource_mode: yaml
  resources:
    - url: /hacsfiles/mini-graph-card/mini-graph-card-bundle.js
      type: module

  dashboards:
    0-lovelace:
      mode: yaml
      filename: ui-lovelace.yaml
      title: Overview
      icon: mdi:view-dashboard
      show_in_sidebar: false

    01-clima-casa:
      mode: yaml
      title: "1 ECLSS Casa"
      icon: mdi:home-thermometer
      show_in_sidebar: true
      filename: lovelace/climate_casa_unified_plancia.yaml

    02-vmc:
      mode: yaml
      title: "2 Air Loop"
      icon: mdi:fan
      show_in_sidebar: true
      filename: lovelace/climate_ventilation_plancia_v2.yaml

    03-riscaldamento:
      mode: yaml
      title: "3 Heating Loop"
      icon: mdi:radiator
      show_in_sidebar: true
      filename: lovelace/climate_heating_plancia.yaml

    04-ac:
      mode: yaml
      title: "4 Cooling Loop"
      icon: mdi:air-conditioner
      show_in_sidebar: true
      filename: lovelace/climate_ac_plancia_v2.yaml

    05-fv-solaredge:
      mode: yaml
      title: "5 PV Array"
      icon: mdi:solar-power
      show_in_sidebar: true
      filename: lovelace/energy_pv_solaredge_plancia.yaml

    # 6-energia:
    #   mode: yaml
    #   title: "6 Energia"
    #   icon: mdi:solar-power
    #   show_in_sidebar: true
    #   filename: lovelace/6_surplus_plancia.yaml

    06-consumi:
      mode: yaml
      title: "6 Power Runtime"
      icon: mdi:flash
      show_in_sidebar: true
      filename: lovelace/consumi_mirai_ehw_plancia.yaml

    07-ehw-acs:
      mode: yaml
      title: "7 DHW / ACS"
      icon: mdi:water-boiler
      show_in_sidebar: true
      filename: lovelace/ehw_plancia.yaml

    08-mirai:
      mode: yaml
      title: "8 MIRAI Plant"
      icon: mdi:heat-pump
      show_in_sidebar: true
      require_admin: false
      filename: lovelace/8_mirai_plancia.yaml

    09-modbus:
      mode: yaml
      title: "9 Fieldbus"
      icon: mdi:transit-connection-variant
      show_in_sidebar: true
      filename: lovelace/modbus_plancia.yaml

    10-involucro:
      mode: yaml
      title: "10 Envelope"
      icon: mdi:home-thermometer-outline
      show_in_sidebar: true
      filename: lovelace/envelope_involucro_plancia.yaml

    11-observability:
      mode: yaml
      title: "11 Observability"
      icon: mdi:clipboard-pulse-outline
      show_in_sidebar: true
      filename: lovelace/observability_plancia.yaml

    92-vmc-legacy:
      mode: yaml
      title: "2 VMC (legacy)"
      icon: mdi:fan
      show_in_sidebar: false
      filename: lovelace/climate_ventilation_plancia.yaml

    94-ac-legacy:
      mode: yaml
      title: "4 AC (legacy)"
      icon: mdi:snowflake
      show_in_sidebar: false
      filename: lovelace/climate_ac_plancia.yaml
