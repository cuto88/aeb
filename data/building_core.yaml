      value: south_north
      confidence: documented
      source: chat_memory
    main_openings:
      value: west
      confidence: documented
      source: chat_memory
      used_by:
        - solar_gain_model
        - cooling_policy
        - shading_policy
  passive_design_notes:
    - value: aperture principali a ovest
      confidence: documented
      source: chat_memory
    - value: sporto esterno circa 150 cm
      confidence: documented
      source: chat_memory
    - value: finestra zona giorno circa 4.30 m2
      confidence: documented
      source: chat_memory

