    value: Italia
    confidence: verified
    source: user_context
  region:
    value: Veneto
    confidence: verified
    source: user_context
  operating_area:
    value: Treviso / Silea / Preganziol
    confidence: documented
    source: chat_memory
  climate_zone:
    value: null
    confidence: to_confirm
    source: missing
    used_by:
      - heating_policy
      - energy_model
      - comfort_policy

building:
  construction_year:
    value: 2020
    confidence: documented
    source: chat_memory
    used_by:
      - envelope_model
      - maintenance_log
  net_floor_area_m2:
    value: 85
    confidence: documented
    source: chat_memory
    used_by:
      - energy_kpi_normalization
      - thermal_model
  orientation:
