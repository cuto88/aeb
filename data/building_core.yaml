schema_version: 0.1
asset:
  id: casa_mercurio
  name: Casa Mercurio
  project: AEB
  type: residential_building
  data_status: initial_chat_extraction
  runtime_repo: cuto88/aeb

metadata:
  created_from:
    - chat_memory
    - existing_aeb_repo_context
  created_on: 2026-06-29
  notes:
    - "Dati estratti da conversazioni tecniche precedenti: da verificare progressivamente contro elaborati, rilievi e runtime HA."
    - "Questo file non contiene segreti e non deve contenere credenziali."

location_context:
