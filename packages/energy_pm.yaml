---
# =========================
# 5_powermeter.yaml – CLEAN
# Helpers + Utility Meter + Statistics per plancia "5 consumi – Core"
# Nessun wrapper top-level, nessuna lista con "- name:". Solo mapping con entity_id univoci.
# =========================

# --- HELPERS -------------------------------------------------
input_number:
  pm2_on_w:
    name: Lavatrice – soglia ON (W)
    min: 0
    max: 3000
    step: 5
    unit_of_measurement: W
    mode: slider
  pm2_off_w:
    name: Lavatrice – soglia OFF (W)
    min: 0
    max: 3000
    step: 5
    unit_of_measurement: W
    mode: slider
  pm2_min_run_min:
    name: Lavatrice – durata minima ciclo (min)
    min: 0
    max: 180
    step: 1
    unit_of_measurement: min
    mode: slider

  pm3_on_w:
    name: Asciugatrice – soglia ON (W)
    min: 0
    max: 3000
    step: 5
    unit_of_measurement: W
    mode: slider
  pm3_off_w:
    name: Asciugatrice – soglia OFF (W)
    min: 0
    max: 3000
    step: 5
    unit_of_measurement: W
    mode: slider
  pm3_min_run_min:
    name: Asciugatrice – durata minima ciclo (min)
    min: 0
    max: 180
    step: 1
    unit_of_measurement: min
    mode: slider

  pm1_on_w:
    name: Romeo – soglia ON (W)
    min: 0
    max: 3000
    step: 5
    unit_of_measurement: W
    mode: slider
  pm1_off_w:
    name: Romeo – soglia OFF (W)
    min: 0
    max: 3000
    step: 5
    unit_of_measurement: W
    mode: slider
  pm1_min_run_min:
    name: Romeo – durata minima ciclo (min)
    min: 0
    max: 180
    step: 1
    unit_of_measurement: min
    mode: slider

  # KPI ultimo ciclo (scritti da automazioni)
  pm2_last_cycle_kwh:
    name: Lavatrice – kWh ultimo ciclo
    min: 0
    max: 20
    step: 0.001
    unit_of_measurement: kWh
    mode: box
  pm3_last_cycle_kwh:
    name: Asciugatrice – kWh ultimo ciclo
    min: 0
    max: 20
    step: 0.001
    unit_of_measurement: kWh
    mode: box
  pm1_last_cycle_kwh:
    name: Romeo – kWh ultimo ciclo
    min: 0
    max: 20
    step: 0.001
    unit_of_measurement: kWh
    mode: box

input_datetime:
  pm2_last_start:
    name: Lavatrice – ultimo start
    has_date: true
    has_time: true
  pm2_last_stop:
    name: Lavatrice – ultimo stop
    has_date: true
    has_time: true
  pm3_last_start:
    name: Asciugatrice – ultimo start
    has_date: true
    has_time: true
  pm3_last_stop:
    name: Asciugatrice – ultimo stop
    has_date: true
    has_time: true
  pm1_last_start:
    name: Romeo – ultimo start
    has_date: true
    has_time: true
  pm1_last_stop:
    name: Romeo – ultimo stop
    has_date: true
    has_time: true

# (opzionale) contatori eventi ciclo
counter:
  pm2_cycles:
    name: Lavatrice – conteggio cicli
    step: 1
    restore: true
  pm3_cycles:
    name: Asciugatrice – conteggio cicli
    step: 1
    restore: true
  pm1_cycles:
    name: Romeo – conteggio cicli
    step: 1
    restore: true

# --- UTILITY METER (kWh giorno/mese) -------------------------
utility_meter:
  mirai_energy_daily:
    source: sensor.mirai_energy_total
    cycle: daily
  mirai_energy_monthly:
    source: sensor.mirai_energy_total
    cycle: monthly

  ehw_energy_daily:
    source: sensor.ehw_energy_total
    cycle: daily
  ehw_energy_monthly:
    source: sensor.ehw_energy_total
    cycle: monthly

  pm2_energy_daily:
    source: sensor.pm2_mss310_energy_kwh_main_channel
    cycle: daily
  pm2_energy_monthly:
    source: sensor.pm2_mss310_energy_kwh_main_channel
    cycle: monthly

  pm3_energy_daily:
    source: sensor.pm3_mss310_energy_kwh_main_channel
    cycle: daily
  pm3_energy_monthly:
    source: sensor.pm3_mss310_energy_kwh_main_channel
    cycle: monthly

  pm1_energy_daily:
    source: sensor.pm1_mss310_energy_kwh_main_channel
    cycle: daily
  pm1_energy_monthly:
    source: sensor.pm1_mss310_energy_kwh_main_channel
    cycle: monthly

# --- STATISTICS (medie/picchi per plancia) -------------------
sensor:
  - platform: statistics
    name: pm2_power_mean_15m
    entity_id: sensor.pm2_mss310_power_w_main_channel
    state_characteristic: mean
    sampling_size: 200
    max_age:
      minutes: 15
  - platform: statistics
    name: pm2_power_max_24h
    entity_id: sensor.pm2_mss310_power_w_main_channel
    state_characteristic: value_max
    sampling_size: 5000
    max_age:
      hours: 24

  - platform: statistics
    name: pm3_power_mean_15m
    entity_id: sensor.pm3_mss310_power_w_main_channel
    state_characteristic: mean
    sampling_size: 200
    max_age:
      minutes: 15
  - platform: statistics
    name: pm3_power_max_24h
    entity_id: sensor.pm3_mss310_power_w_main_channel
    state_characteristic: value_max
    sampling_size: 5000
    max_age:
      hours: 24

  - platform: statistics
    name: pm1_power_mean_15m
    entity_id: sensor.pm1_mss310_power_w_main_channel
    state_characteristic: mean
    sampling_size: 200
    max_age:
      minutes: 15
  - platform: statistics
    name: pm1_power_max_24h
    entity_id: sensor.pm1_mss310_power_w_main_channel
    state_characteristic: value_max
    sampling_size: 5000
    max_age:
      hours: 24

# --- FRIENDLY NAMES (coerenza UI) ----------------------------
homeassistant:
  customize:
    sensor.local_meters_power_w: {friendly_name: "Misuratori locali - Somma potenze"}
    sensor.global_consumption_estimated_w: {friendly_name: "Consumo totale casa stimato"}
    sensor.local_meters_global_incidence_pct: {friendly_name: "Incidenza misuratori locali"}
    sensor.mirai_energy_total: {friendly_name: "Mirai - Energia totale"}
    sensor.mirai_energy_daily: {friendly_name: "Mirai - kWh / giorno"}
    sensor.mirai_energy_monthly: {friendly_name: "Mirai - kWh / mese"}
    sensor.ehw_energy_total: {friendly_name: "EHW - Energia totale"}
    sensor.ehw_energy_daily: {friendly_name: "EHW - kWh / giorno"}
    sensor.ehw_energy_monthly: {friendly_name: "EHW - kWh / mese"}
    sensor.pm1_energy_daily: {friendly_name: "Romeo - kWh / giorno"}
    sensor.pm1_energy_monthly: {friendly_name: "Romeo - kWh / mese"}
    sensor.pm2_energy_daily: {friendly_name: "Lavatrice - kWh / giorno"}
    sensor.pm2_energy_monthly: {friendly_name: "Lavatrice - kWh / mese"}
    sensor.pm3_energy_daily: {friendly_name: "Asciugatrice - kWh / giorno"}
    sensor.pm3_energy_monthly: {friendly_name: "Asciugatrice - kWh / mese"}


# --- TEMPLATE: ore ON oggi (per KPI plancia) -----------------
template:
  - sensor:
      - name: "Mirai energy total"
        unique_id: mirai_energy_total
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:counter
        availability: "{{ states('sensor.a_energia_prelevata_forward') not in ['unknown','unavailable'] }}"
        state: >
          {{ states('sensor.a_energia_prelevata_forward') }}

      - name: "EHW energy total"
        unique_id: ehw_energy_total
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        icon: mdi:counter
        availability: "{{ states('sensor.b_energia_prelevata_forward') not in ['unknown','unavailable'] }}"
        state: >
          {{ states('sensor.b_energia_prelevata_forward') }}

      - name: "Local meters power w"
        unique_id: local_meters_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:meter-electric
        state: >
          {% set mirai = states('sensor.mirai_power_w') | float(0) %}
          {% set ehw = states('sensor.ehw_power_w') | float(0) %}
          {% set ds01 = states('sensor.ds_01_power_w') | float(0) %}
          {% set pm1 = states('sensor.pm1_mss310_power_w_main_channel') | float(0) %}
          {% set pm2 = states('sensor.pm2_mss310_power_w_main_channel') | float(0) %}
          {% set pm3 = states('sensor.pm3_mss310_power_w_main_channel') | float(0) %}
          {{
            [
              mirai if mirai > 0 else 0,
              ehw if ehw > 0 else 0,
              ds01 if ds01 > 0 else 0,
              pm1 if pm1 > 0 else 0,
              pm2 if pm2 > 0 else 0,
              pm3 if pm3 > 0 else 0
            ] | sum | round(0)
          }}
        attributes:
          mirai_w: "{{ [states('sensor.mirai_power_w') | float(0), 0] | max }}"
          ehw_w: "{{ [states('sensor.ehw_power_w') | float(0), 0] | max }}"
          ds01_w: "{{ [states('sensor.ds_01_power_w') | float(0), 0] | max }}"
          pm1_w: "{{ [states('sensor.pm1_mss310_power_w_main_channel') | float(0), 0] | max }}"
          pm2_w: "{{ [states('sensor.pm2_mss310_power_w_main_channel') | float(0), 0] | max }}"
          pm3_w: "{{ [states('sensor.pm3_mss310_power_w_main_channel') | float(0), 0] | max }}"

      - name: "Global consumption estimated w"
        unique_id: global_consumption_estimated_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        icon: mdi:transmission-tower
        availability: >
          {{
            states('sensor.grid_power_w') | float(default=none) is number
            and states('sensor.pv_power_now') | float(default=none) is number
          }}
        state: >
          {% set grid = states('sensor.grid_power_w') | float(default=none) %}
          {% set pv = states('sensor.pv_power_now') | float(default=none) %}
          {% if grid is number and pv is number %}
            {{ ([pv + grid, 0] | max) | round(0) }}
          {% else %}
            {{ none }}
          {% endif %}
        attributes:
          source: "sensor.pv_power_now + sensor.grid_power_w"
          note: "Consumo totale casa stimato come produzione PV piu scambio rete signed"

      - name: "Local meters energy daily total"
        unique_id: local_meters_energy_daily_total
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total
        icon: mdi:counter
        state: >
          {% set vals = [
            states('sensor.mirai_energy_daily') | float(0),
            states('sensor.ehw_energy_daily') | float(0),
            states('sensor.ds01_energy_daily') | float(0),
            states('sensor.pm1_energy_daily') | float(0),
            states('sensor.pm2_energy_daily') | float(0),
            states('sensor.pm3_energy_daily') | float(0)
          ] %}
          {{ (vals | sum) | round(3) }}

      - name: "Mirai daily share pct"
        unique_id: mirai_daily_share_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:heat-pump
        availability: "{{ states('sensor.local_meters_energy_daily_total') | float(0) > 0 }}"
        state: >
          {% set num = states('sensor.mirai_energy_daily') | float(0) %}
          {% set den = states('sensor.local_meters_energy_daily_total') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "EHW daily share pct"
        unique_id: ehw_daily_share_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:water-boiler
        availability: "{{ states('sensor.local_meters_energy_daily_total') | float(0) > 0 }}"
        state: >
          {% set num = states('sensor.ehw_energy_daily') | float(0) %}
          {% set den = states('sensor.local_meters_energy_daily_total') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "ds01 daily share pct"
        unique_id: ds01_daily_share_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:desktop-tower-monitor
        availability: "{{ states('sensor.local_meters_energy_daily_total') | float(0) > 0 }}"
        state: >
          {% set num = states('sensor.ds01_energy_daily') | float(0) %}
          {% set den = states('sensor.local_meters_energy_daily_total') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "PM1 daily share pct"
        unique_id: pm1_daily_share_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:fan
        availability: "{{ states('sensor.local_meters_energy_daily_total') | float(0) > 0 }}"
        state: >
          {% set num = states('sensor.pm1_energy_daily') | float(0) %}
          {% set den = states('sensor.local_meters_energy_daily_total') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "PM2 daily share pct"
        unique_id: pm2_daily_share_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:washing-machine
        availability: "{{ states('sensor.local_meters_energy_daily_total') | float(0) > 0 }}"
        state: >
          {% set num = states('sensor.pm2_energy_daily') | float(0) %}
          {% set den = states('sensor.local_meters_energy_daily_total') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "PM3 daily share pct"
        unique_id: pm3_daily_share_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:tumble-dryer
        availability: "{{ states('sensor.local_meters_energy_daily_total') | float(0) > 0 }}"
        state: >
          {% set num = states('sensor.pm3_energy_daily') | float(0) %}
          {% set den = states('sensor.local_meters_energy_daily_total') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "Local meters daily share pct"
        unique_id: local_meters_daily_share_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:chart-donut
        availability: "{{ states('sensor.local_meters_energy_daily_total') | float(0) > 0 }}"
        state: >
          100

      - name: "Local meters global incidence pct"
        unique_id: local_meters_global_incidence_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:chart-donut
        availability: >
          {% set total = states('sensor.global_consumption_estimated_w') | float(default=none) %}
          {{ total is number and total > 0 }}
        state: >
          {% set local = states('sensor.local_meters_power_w') | float(default=none) %}
          {% set total = states('sensor.global_consumption_estimated_w') | float(default=none) %}
          {% if local is number and total is number and total > 0 %}
            {{ ((local / total) * 100) | round(1) }}
          {% else %}
            {{ none }}
          {% endif %}
        attributes:
          interpretation: "Quota dei misuratori locali sul totale di riferimento letto da SDM120"
          denominator_source: "{{ state_attr('sensor.global_consumption_estimated_w', 'source') }}"

      - name: "Mirai global incidence pct"
        unique_id: mirai_global_incidence_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:heat-pump
        availability: "{{ states('sensor.global_consumption_estimated_w') | float(default=none) is number and states('sensor.global_consumption_estimated_w') | float(0) > 0 }}"
        state: >
          {% set num = [states('sensor.mirai_power_w') | float(0), 0] | max %}
          {% set den = states('sensor.global_consumption_estimated_w') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "EHW global incidence pct"
        unique_id: ehw_global_incidence_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:water-boiler
        availability: "{{ states('sensor.global_consumption_estimated_w') | float(default=none) is number and states('sensor.global_consumption_estimated_w') | float(0) > 0 }}"
        state: >
          {% set num = [states('sensor.ehw_power_w') | float(0), 0] | max %}
          {% set den = states('sensor.global_consumption_estimated_w') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "ds01 global incidence pct"
        unique_id: ds01_global_incidence_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:desktop-tower-monitor
        availability: "{{ states('sensor.global_consumption_estimated_w') | float(default=none) is number and states('sensor.global_consumption_estimated_w') | float(0) > 0 }}"
        state: >
          {% set num = [states('sensor.ds_01_power_w') | float(0), 0] | max %}
          {% set den = states('sensor.global_consumption_estimated_w') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "PM1 global incidence pct"
        unique_id: pm1_global_incidence_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:fan
        availability: "{{ states('sensor.global_consumption_estimated_w') | float(default=none) is number and states('sensor.global_consumption_estimated_w') | float(0) > 0 }}"
        state: >
          {% set num = [states('sensor.pm1_mss310_power_w_main_channel') | float(0), 0] | max %}
          {% set den = states('sensor.global_consumption_estimated_w') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "PM2 global incidence pct"
        unique_id: pm2_global_incidence_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:washing-machine
        availability: "{{ states('sensor.global_consumption_estimated_w') | float(default=none) is number and states('sensor.global_consumption_estimated_w') | float(0) > 0 }}"
        state: >
          {% set num = [states('sensor.pm2_mss310_power_w_main_channel') | float(0), 0] | max %}
          {% set den = states('sensor.global_consumption_estimated_w') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "PM3 global incidence pct"
        unique_id: pm3_global_incidence_pct
        unit_of_measurement: "%"
        state_class: measurement
        icon: mdi:tumble-dryer
        availability: "{{ states('sensor.global_consumption_estimated_w') | float(default=none) is number and states('sensor.global_consumption_estimated_w') | float(0) > 0 }}"
        state: >
          {% set num = [states('sensor.pm3_mss310_power_w_main_channel') | float(0), 0] | max %}
          {% set den = states('sensor.global_consumption_estimated_w') | float(0) %}
          {{ ((num / den) * 100) | round(1) if den > 0 else none }}

      - name: "Lavatrice – h ON oggi"
        unique_id: pm2_on_time_today
        unit_of_measurement: "h"
        icon: mdi:timer-outline
        state: >
          {{ (states('sensor.pm2_in_ciclo_today') | float(0)) | round(2) }}

      - name: "Asciugatrice – h ON oggi"
        unique_id: pm3_on_time_today
        unit_of_measurement: "h"
        icon: mdi:timer-outline
        state: >
          {{ (states('sensor.pm3_in_ciclo_today') | float(0)) | round(2) }}

      - name: "Romeo – h ON oggi"
        unique_id: pm1_on_time_today
        unit_of_measurement: "h"
        icon: mdi:timer-outline
        state: >
          {{ (states('sensor.pm1_in_ciclo_today') | float(0)) | round(2) }}
