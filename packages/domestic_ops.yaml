            {% elif laundry_type == 'bambino' %}
              {% if load <= 3 %}
                30
              {% elif load <= 5 %}
                40
              {% else %}
                50
              {% endif %}
            {% elif laundry_type == 'lenzuola' %}
              {% if load <= 4 %}
                55
              {% elif load <= 6 %}
                65
              {% else %}
                75
              {% endif %}
            {% elif laundry_type == 'asciugamani' %}
              {% if load <= 4 %}
                60
              {% elif load <= 6 %}
                70
              {% else %}
                80
              {% endif %}
            {% else %}
              {% if load <= 3 %}
                40
              {% elif load <= 5 %}
                50
              {% else %}
                60
              {% endif %}
            {% endif %}
          detergent_g: >-
            {% set laundry_type = states('input_select.domesticops_laundry_type') %}
            {% set load = states('input_number.domesticops_laundry_load_kg') | float(4) %}
            {% if laundry_type == 'sportivo' %}
              {% if load <= 2 %}
                25
              {% elif load <= 3 %}
                35
              {% else %}
                45
              {% endif %}
            {% else %}
              0
            {% endif %}
          detergent_ml_note: >-
            {% set laundry_type = states('input_select.domesticops_laundry_type') %}
            {% set load = states('input_number.domesticops_laundry_load_kg') | float(4) %}
            {% if laundry_type == 'sportivo' %}
              Dash Power polvere: usa il campo grammi, non ml.
            {% elif laundry_type == 'bambino' %}
              Omino Bianco: dose precisa su {{ load }} kg.
            {% elif laundry_type == 'lenzuola' %}
              Omino Bianco: dose precisa su {{ load }} kg.
            {% elif laundry_type == 'asciugamani' %}
              Omino Bianco: dose precisa su {{ load }} kg.
            {% else %}
              Omino Bianco: dose precisa su {{ load }} kg.
            {% endif %}
          percarbonate_g: >-
            {% set laundry_type = states('input_select.domesticops_laundry_type') %}
            {% set load = states('input_number.domesticops_laundry_load_kg') | float(4) %}
