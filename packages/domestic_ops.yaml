            Vendor consigliato: Tigota, Acqua e Sapone, supermercato grande o Amazon. La priorita e la tipologia corretta, non il brand.
          available_products_note: >-
            Disponibili visti in casa: Omino Bianco liquido, Dash Power, ACE Gentile, Percarbonato, Acido Citrico, Vernel Carezza Delicata.
          buy_next_note: >-
            Priorita acquisti: additivo igienizzante per bucato sport/colorati; poi acchiappa-colore di ricambio. Facoltativo un detergente lana/delicati o baby-sensitive se lavi spesso capi sensibili.

script:
  domesticops_notify:
    alias: "DomesticOps - Notifica operativa"
    mode: queued
    fields:
      title:
        description: "Titolo notifica"
        example: "DomesticOps"
      message:
        description: "Messaggio notifica"
        example: "Condizioni buone: avvia lavastoviglie ora."
    sequence:
      - condition: state
        entity_id: input_boolean.domesticops_notify_enabled
        state: "on"
      - service: logbook.log
        data:
          name: "{{ title | default('DomesticOps') }}"
          message: "{{ message }}"
          entity_id: input_boolean.domesticops_notify_enabled
      - action: script.telegram_ha_mercurio_send
        data:
          title: "{{ title | default('DomesticOps') }}"
          message: |
            {{ message }}

            Ora: `{{ now() | string | replace('`', '') }}`

automation:
  - id: domesticops_notify_lavastoviglie_window
    alias: "DomesticOps - Notifica slot lavastoviglie"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.domesticops_lavastoviglie_window_ok
        to: "on"
        for: "00:15:00"
    condition:
      - condition: state
        entity_id: input_boolean.domesticops_domestic_mode_enabled
        state: "on"
    action:
      - action: script.domesticops_notify
        data:
          title: "DomesticOps - Lavastoviglie"
          message: "Condizioni buone: avvia lavastoviglie ora."

  - id: domesticops_notify_lavatrice_window
    alias: "DomesticOps - Notifica slot lavatrice"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.domesticops_lavatrice_window_ok
        to: "on"
        for: "00:15:00"
    condition:
      - condition: state
        entity_id: input_boolean.domesticops_domestic_mode_enabled
        state: "on"
    action:
      - action: script.domesticops_notify
        data:
          title: "DomesticOps - Lavatrice"
          message: "Slot energetico buono: puoi avviare lavatrice."

  - id: domesticops_notify_drying_advice_outside
    alias: "DomesticOps - Notifica stendi fuori"
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.domesticops_laundry_drying_advice
        to: "stendi_fuori"
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: input_boolean.domesticops_domestic_mode_enabled
        state: "on"
    action:
      - action: script.domesticops_notify
        data:
          title: "DomesticOps - Bucato"
          message: "Condizioni ottime per stendere fuori."

  - id: domesticops_notify_drying_advice_retrieve
    alias: "DomesticOps - Notifica rientra bucato"
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.domesticops_laundry_drying_advice
        to: "rientra_e_completa_asciugatrice"
        for: "00:10:00"
      - platform: state
        entity_id: sensor.domesticops_laundry_drying_advice
        to: "rischio_pioggia"
        for: "00:10:00"
      - platform: state
        entity_id: sensor.domesticops_laundry_drying_advice
        to: "rischio_umidita"
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: input_boolean.domesticops_domestic_mode_enabled
        state: "on"
    variables:
      message: >-
        {% if trigger.to_state.state == 'rischio_pioggia' %}
          Rientra bucato: c'e rischio pioggia.
        {% elif trigger.to_state.state == 'rischio_umidita' %}
          Rientra bucato: umidita esterna troppo alta.
        {% else %}
          Rientra il bucato e completa in asciugatrice.
        {% endif %}
    action:
      - action: script.domesticops_notify
        data:
          title: "DomesticOps - Bucato"
          message: "{{ message }}"

  - id: domesticops_notify_drying_advice_dryer
    alias: "DomesticOps - Notifica asciugatrice FV"
    mode: restart
    trigger:
      - platform: state
        entity_id: sensor.domesticops_laundry_drying_advice
        to: "asciugatrice_fv"
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: input_boolean.domesticops_domestic_mode_enabled
        state: "on"
    action:
      - action: script.domesticops_notify
        data:
          title: "DomesticOps - Bucato"
          message: "Condizioni esterne sfavorevoli: conviene asciugatrice con FV."

  - id: domesticops_lavatrice_cycle_complete
    alias: "DomesticOps - Ciclo lavatrice completato"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.domesticops_lavatrice_running
        from: "on"
        to: "off"
        for: "00:02:00"
    condition:
      - condition: template
        value_template: >-
          {{ trigger.from_state is not none and (as_timestamp(now()) - as_timestamp(trigger.from_state.last_changed)) > 900 }}
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.domesticops_lavatrice_cycles_total
        data:
          value: "{{ states('input_number.domesticops_lavatrice_cycles_total') | float(0) + 1 }}"
      - action: input_boolean.turn_on
        target:
          entity_id: input_boolean.domesticops_laundry_pending
      - action: script.domesticops_notify
        data:
          title: "DomesticOps - Lavatrice finita"
          message: >-
            {{ states('sensor.domesticops_drying_advice_human') }}
            {{ state_attr('sensor.domesticops_drying_advice_human', 'next_action') }}

  - id: domesticops_asciugatrice_cycle_complete
    alias: "DomesticOps - Ciclo asciugatrice completato"
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.domesticops_asciugatrice_running
        from: "on"
        to: "off"
        for: "00:02:00"
    condition:
      - condition: template
        value_template: >-
          {{ trigger.from_state is not none and (as_timestamp(now()) - as_timestamp(trigger.from_state.last_changed)) > 600 }}
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.domesticops_asciugatrice_cycles_total
        data:
          value: "{{ states('input_number.domesticops_asciugatrice_cycles_total') | float(0) + 1 }}"
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.domesticops_laundry_pending
      - action: input_boolean.turn_off
        target:
          entity_id: input_boolean.domesticops_laundry_outside

