            {% else %}
              0-15
            {% endif %}
          citric_acid_note: "Acido citrico: solo in vaschetta ammorbidente, non insieme al detersivo."
          softener_note: >-
            {% set laundry_type = states('input_select.domesticops_laundry_type') %}
            {% if laundry_type == 'asciugamani' or laundry_type == 'sportivo' %}
              Vernel: 0 ml, meglio evitarlo.
            {% elif laundry_type == 'bambino' %}
              Vernel: 0-10 ml, opzionale.
            {% else %}
              Vernel: 0-15 ml, opzionale.
            {% endif %}
          dash_note: >-
            Dash Power: usalo come base misurata in grammi per sportivo. Non sommarlo a Omino nello stesso lavaggio.
          ace_gentile_note: >-
            ACE Gentile: usalo come supporto mirato, non come base di default. Ha senso soprattutto per capi che vuoi ravvivare o igienizzare con piu delicatezza; non serve nel flusso standard di ogni lavaggio.
