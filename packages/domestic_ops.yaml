            {{ states('input_number.domesticops_laundry_load_kg') }}
          use_now: >-
            {% set laundry_type = states('input_select.domesticops_laundry_type') %}
            {% if laundry_type == 'sportivo' %}
              Usa Dash Power polvere come detersivo principale.
            {% elif laundry_type == 'bambino' %}
              Usa Omino Bianco liquido, dose leggera.
            {% elif laundry_type == 'lenzuola' %}
              Usa Omino Bianco liquido; aggiungi Percarbonato.
