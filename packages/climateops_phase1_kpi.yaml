---
template:
  - binary_sensor:
      - name: "ClimateOps KPI Comfort Band Flag"
        unique_id: climateops_kpi_comfort_band_flag
        state: >-
          {% set t_in = states('sensor.t_in_med') | float(default=none) %}
          {{ t_in is number and t_in >= 20.0 and t_in <= 26.0 }}
        availability: >-
          {{ states('sensor.t_in_med') not in ['unknown', 'unavailable', ''] }}

      - name: "ClimateOps KPI VMC Boost Flag"
        unique_id: climateops_kpi_vmc_boost_flag
        state: >-
          {% set target = states('sensor.vmc_vel_target') | int(default=-1) %}
          {{ target >= 3 }}
        availability: >-
          {{ states('sensor.vmc_vel_target') not in ['unknown', 'unavailable', ''] }}

  - sensor:
      - name: "ClimateOps KPI Comfort Band Percent Today"
        unique_id: climateops_kpi_comfort_band_percent_today
        unit_of_measurement: "%"
        state: >-
          {% if states('sensor.t_in_med') in ['unknown', 'unavailable', ''] %}
            unknown
          {% elif is_number(states('sensor.climateops_kpi_raw_comfort_band_ratio_today')) %}
            {{ (states('sensor.climateops_kpi_raw_comfort_band_ratio_today') | float(0)) | round(1) }}
          {% else %}
            unknown
          {% endif %}
        availability: "{{ true }}"

      - name: "ClimateOps KPI Heating Cycles Today"
        unique_id: climateops_kpi_heating_cycles_today
        state: >-
          {% if states('switch.heating_master') in ['unknown', 'unavailable', ''] %}
            unknown
          {% elif is_number(states('sensor.climateops_kpi_raw_heating_cycles_today')) %}
            {{ states('sensor.climateops_kpi_raw_heating_cycles_today') | int(0) }}
          {% else %}
            unknown
          {% endif %}
        availability: "{{ true }}"

      - name: "ClimateOps KPI AC Cycles Today"
        unique_id: climateops_kpi_ac_cycles_today
        state: >-
          {% set g = states('sensor.climateops_kpi_raw_ac_giorno_cycles_today') %}
          {% set n = states('sensor.climateops_kpi_raw_ac_notte_cycles_today') %}
          {% set g_ok = is_number(g) %}
          {% set n_ok = is_number(n) %}
          {% if not g_ok and not n_ok %}
            unknown
          {% else %}
            {{ (g | float(0) + n | float(0)) | round(0) | int }}
          {% endif %}
        availability: "{{ true }}"

      - name: "ClimateOps KPI VMC Boost Minutes Today"
        unique_id: climateops_kpi_vmc_boost_minutes_today
        unit_of_measurement: "min"
        state: >-
          {% if states('sensor.vmc_vel_target') in ['unknown', 'unavailable', ''] %}
            unknown
          {% elif is_number(states('sensor.climateops_kpi_raw_vmc_boost_hours_today')) %}
            {{ ((states('sensor.climateops_kpi_raw_vmc_boost_hours_today') | float(0)) * 60) | round(0) | int }}
          {% else %}
            unknown
          {% endif %}
        availability: "{{ true }}"

history_stats:
  - name: "ClimateOps KPI Raw Comfort Band Ratio Today"
    unique_id: climateops_kpi_raw_comfort_band_ratio_today
    entity_id: binary_sensor.climateops_kpi_comfort_band_flag
    state: "on"
    type: ratio
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - name: "ClimateOps KPI Raw Heating Cycles Today"
    unique_id: climateops_kpi_raw_heating_cycles_today
    entity_id: switch.heating_master
    state: "on"
    type: count
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - name: "ClimateOps KPI Raw AC Giorno Cycles Today"
    unique_id: climateops_kpi_raw_ac_giorno_cycles_today
    entity_id: switch.ac_giorno
    state: "on"
    type: count
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - name: "ClimateOps KPI Raw AC Notte Cycles Today"
    unique_id: climateops_kpi_raw_ac_notte_cycles_today
    entity_id: switch.ac_notte
    state: "on"
    type: count
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"

  - name: "ClimateOps KPI Raw VMC Boost Hours Today"
    unique_id: climateops_kpi_raw_vmc_boost_hours_today
    entity_id: binary_sensor.climateops_kpi_vmc_boost_flag
    state: "on"
    type: time
    start: "{{ today_at('00:00') }}"
    end: "{{ now() }}"
