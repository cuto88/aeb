homeassistant:
  customize:
    switch.4_ch_interruttore_3:
      friendly_name: "Riscaldamento - Relay Fisico"
      icon: mdi:radiator
      # NOTA: rele hardware invertito (state ON = circuito disattivo, OFF = attivo)
      # Nome storico dispositivo: "Riduzione Notturna" nelle impostazioni del termostato.

###############################################################################
# 6) SCRIPT DI SUPPORTO
###############################################################################
script:  # ###############################################################################
# 7) AUTOMAZIONI
###############################################################################
automation:  # Gestione timeout manuale
  - id: heating_manual_timeout
    alias: "HEATING  timeout manuale"
    trigger:
      - platform: state
        entity_id: input_boolean.heating_manual_active
        to: "on"
        id: manual_on
      - platform: event
        event_type: timer.finished
        event_data:
          entity_id: timer.heating_manual_timeout
        id: timer_finished
    action:
      - choose:
          - conditions:
              - condition: state
                entity_id: input_boolean.heating_manual_active
                state: "on"
            sequence:
              - service: timer.start
                target:
                  entity_id: timer.heating_manual_timeout
          - conditions:
              - condition: trigger
                id: timer_finished
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.heating_manual_active

# ENTITY MAP STATUS (heating)
# - All entity_id aligned with logica/core/README_sensori_clima.md
# - No unused helpers except optional diagnostics listed in README
# - External dependencies: binary_sensor.policy_surplus_ok (PV surplus)
