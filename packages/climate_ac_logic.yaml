script:
  # Legacy/manual wrapper retained for compatibility and UI visibility.
  # It is not part of the canonical automatic writer chain.
  ac_apply_targets:
    alias: "AC – Apply targets"
    mode: single
    sequence:
      - service: script.ac_giorno_apply
      - service: script.ac_notte_apply
  # Legacy/manual wrapper retained for compatibility and UI visibility.
  # Canonical automatic authority stays in ClimateOps system_actuate.
  ac_send_command:
    alias: "AC – Send command (driver wrapper)"
    mode: single
    fields:
      target:
        description: "ac_giorno | ac_notte"
        example: "ac_giorno"
    sequence:
      - condition: template
        value_template: "{{ not is_state('input_boolean.ac_send_command_busy','on') }}"
      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.ac_send_command_busy
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ target == 'ac_giorno' }}"
            sequence:
              - service: script.ac_giorno_apply
          - conditions:
              - condition: template
                value_template: "{{ target == 'ac_notte' }}"
            sequence:
              - service: script.ac_notte_apply
        default: []
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.ac_send_command_busy
  # Leaf driver placeholder. The repo-side authority audit treats the
  # apply scripts as the relevant callable edge for AC actuation.
  ac_hw_press:
    alias: "AC – HW press (leaf driver)"
    mode: single
    fields:
      target:
        description: "ac_giorno | ac_notte"
    sequence: []
