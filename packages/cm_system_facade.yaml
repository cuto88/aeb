---
template:
  - sensor:
      - name: "CM System Reason"
        unique_id: cm_system_reason
        state: >-
          {% if is_state('binary_sensor.contract_hierarchy_mode_ready', 'on') %}
            {{ states('sensor.climateops_hierarchy_reason') }}
          {% elif states('sensor.climateops_planner_reason') not in ['unknown','unavailable',''] %}
            FALLBACK_PLANNER: {{ states('sensor.climateops_planner_reason') }}
          {% else %}
            FALLBACK_NO_HIERARCHY_OR_PLANNER
          {% endif %}

      - name: "CM System Mode Suggested"
        unique_id: cm_system_mode_suggested
        state: >-
          {% if is_state('binary_sensor.contract_hierarchy_mode_ready', 'on') %}
            {{ states('sensor.climateops_hierarchy_mode') }}
          {% else %}
            {% set planner = states('sensor.planner_recommended_mode') %}
            {% set worst_room = states('sensor.envelope_worst_room_name') %}
            {% set cool_sp = states('input_number.ac_cool_setpoint') | float(25) %}
            {% set night_rooms = ['notte1', 'notte2', 'bagno'] %}
            {% if planner == 'HEAT' %}HEAT
            {% elif planner == 'COOL' and worst_room in night_rooms %}COOL_NIGHT
            {% elif planner == 'COOL' and worst_room == 'giorno' %}COOL_DAY
            {% elif planner == 'COOL' and states('sensor.t_in_med') | float(0) > (cool_sp + 0.5) %}COOL_NIGHT
            {% elif planner == 'COOL' %}COOL_DAY
            {% else %}IDLE
            {% endif %}
          {% endif %}
        availability: "{{ true }}"

      - name: "CM System Heat Source"
        unique_id: cm_system_heat_source
        state: >-
          {% if states('sensor.cm_system_mode_suggested') != 'HEAT' %}
            inactive
          {% elif is_state('binary_sensor.heating_held_by_min_on_lock', 'on') %}
            heating_hold
          {% elif is_state('binary_sensor.heating_demand_active', 'on') %}
            heating_demand
          {% elif is_state('binary_sensor.climateops_request_heat', 'on') %}
            climateops_request_heat
          {% else %}
            other
          {% endif %}
