automation:
  - id: envelope_human_action_telegram_alert
    alias: "Envelope - richiesta azione umana Telegram"
    mode: queued
    trigger:
      - platform: state
        entity_id: sensor.envelope_recommended_action
        to: open_for_night_flush
        for: "00:05:00"
      - platform: state
        entity_id: sensor.envelope_recommended_action
        to: prepare_night_flush
        for: "00:05:00"
      - platform: state
        entity_id: sensor.envelope_recommended_action
        to: shade_now
        for: "00:05:00"
      - platform: state
        entity_id: sensor.envelope_recommended_action
        to: let_sun_in
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.envelope_notify_enabled
        state: "on"
      - condition: template
        value_template: >-
          {{
            trigger.to_state is not none
            and trigger.to_state.state in [
              'open_for_night_flush',
              'prepare_night_flush',
              'shade_now',
              'let_sun_in'
            ]
          }}
    variables:
      action: "{{ trigger.to_state.state if trigger.to_state is not none else 'unknown' }}"
      action_label: >-
        {% set labels = {
          'open_for_night_flush': 'apri finestre per raffrescamento notturno',
          'prepare_night_flush': 'prepara le finestre per raffrescamento notturno',
          'shade_now': 'chiudi scuri / applica ombreggiatura',
          'let_sun_in': 'lascia entrare il sole'
        } %}
        {{ labels.get(action, action | replace('_', ' ')) }}
      action_reason: >-
        {% if action == 'open_for_night_flush' %}
          Raffrescamento notturno favorevole: aprire ora le finestre aiuta a scaricare il calore accumulato.
        {% elif action == 'prepare_night_flush' %}
          La finestra esterna si sta aprendo: prepara l'apertura per il raffrescamento notturno.
        {% elif action == 'shade_now' %}
          Il guadagno solare o il rischio di surriscaldamento è alto: conviene schermare adesso.
        {% elif action == 'let_sun_in' %}
          Il guadagno passivo è utile: lascia entrare il sole.
        {% else %}
          {{ states('sensor.envelope_recommended_action') }}
        {% endif %}
    action:
      - action: script.telegram_ha_mercurio_send
        data:
          title: "Azione richiesta: {{ action_label }}"
          message: |
            Il sistema sta richiedendo un'azione umana per l'involucro.

            Azione consigliata: `{{ action | replace('`', '') }}`
            Cosa fare: `{{ action_label | replace('`', '') }}`
            Motivo: `{{ action_reason | replace('`', '') }}`
            Stanza peggiore: `{{ states('sensor.envelope_worst_room_name') | replace('`', '') }}`
            Rischio stanza peggiore: `{{ states('sensor.envelope_worst_room_overheating_risk') | replace('`', '') }}`
            Potenziale raffrescamento notturno: `{{ states('sensor.envelope_house_night_flush_potential') | replace('`', '') }}`
            Stato esterno: `{{ states('sensor.envelope_outdoor_cooling_window_state') | replace('`', '') }}`
            Consiglio generale: `{{ states('sensor.envelope_recommended_action') | replace('`', '') }}`
            Ora: `{{ now() | string | replace('`', '') }}`

  - id: envelope_close_windows_telegram_alert
    alias: "Envelope - richiesta chiusura finestre Telegram"
    mode: queued
    trigger:
      - platform: state
        entity_id: sensor.envelope_recommended_action
        to: keep_closed
        for: "00:05:00"
      - platform: state
        entity_id: sensor.envelope_recommended_action
        to: ac_justified
        for: "00:05:00"
    condition:
      - condition: state
        entity_id: input_boolean.envelope_notify_enabled
        state: "on"
      - condition: template
        value_template: >-
          {{
            trigger.to_state is not none
            and trigger.to_state.state in ['keep_closed', 'ac_justified']
          }}
      - condition: state
        entity_id: binary_sensor.casa_chiusa
        state: "off"
    variables:
      action: "{{ trigger.to_state.state if trigger.to_state is not none else 'unknown' }}"
      action_reason: >-
        {% if action == 'ac_justified' %}
          Involucro sfavorevole al raffrescamento naturale: meglio chiudere le finestre e lavorare in meccanico.
        {% else %}
          La finestra utile è terminata o non favorevole: conviene richiudere le finestre.
        {% endif %}
    action:
      - action: script.telegram_ha_mercurio_send
        data:
          title: "Azione richiesta: chiudi finestre"
          message: |
            Il sistema sta richiedendo un'azione umana di chiusura serramenti.

            Cosa fare: `chiudi finestre`
            Motivo: `{{ action_reason | replace('`', '') }}`
            Finestre aperte: `{{ states('sensor.vent_finestre_state') | replace('`', '') }}`
            Azione involucro (tecnica): `{{ action | replace('`', '') }}`
            Azione involucro (leggibile): `{{ states('sensor.envelope_azione_consigliata') | replace('`', '') }}`
            Stato esterno: `{{ states('sensor.envelope_outdoor_cooling_window_state') | replace('`', '') }}`
            Ora: `{{ now() | string | replace('`', '') }}`
