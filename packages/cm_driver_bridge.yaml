---
template:
  - binary_sensor:
      - name: "CM Driver Heating Is On"
        unique_id: cm_driver_heating_is_on
        state: "{{ is_state('binary_sensor.heating_master_is_on_proxy','on') }}"
      - name: "CM Driver VMC Is Running"
        unique_id: cm_driver_vmc_is_running
        state: "{{ is_state('binary_sensor.vmc_is_running_proxy','on') }}"
      - name: "CM Driver AC Giorno Is On"
        unique_id: cm_driver_ac_giorno_is_on
        state: "{{ is_state('binary_sensor.ac_giorno_is_on_proxy','on') }}"
      - name: "CM Driver AC Notte Is On"
        unique_id: cm_driver_ac_notte_is_on
        state: "{{ is_state('binary_sensor.ac_notte_is_on_proxy','on') }}"

  - sensor:
      - name: "CM Mirai Power W"
        unique_id: cm_mirai_power_w
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.sensor_grid_power_w') }}"
        availability: "{{ states('sensor.sensor_grid_power_w') not in ['unknown','unavailable'] }}"
      - name: "CM EHW Power W"
        unique_id: cm_ehw_power_w
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        state: "{{ states('sensor.sensor_pv_power_w') }}"
        availability: "{{ states('sensor.sensor_pv_power_w') not in ['unknown','unavailable'] }}"

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.grid_power_w
          - sensor.grid_direction
      - platform: time_pattern
        seconds: "/30"
    sensor:
      - name: "CM Grid Power W"
        unique_id: cm_grid_power_w
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        availability: "{{ states('sensor.grid_power_w') not in ['unknown','unavailable'] }}"
        state: "{{ states('sensor.grid_power_w') }}"
      - name: "CM Grid Direction"
        unique_id: cm_grid_direction
        availability: "{{ states('sensor.grid_direction') not in ['unknown','unavailable'] }}"
        state: "{{ states('sensor.grid_direction') }}"
