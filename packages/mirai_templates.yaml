input_number:
  mirai_running_power_on_w:
    name: "MIRAI - soglia ON da consumi (W)"
    min: 50
    max: 5000
    step: 10
    unit_of_measurement: W
    mode: box
    initial: 150

template:
  - binary_sensor:
      - name: "mirai_manual_unit_profile_ok"
        unique_id: mirai_manual_unit_profile_ok
        icon: mdi:counter
        state: >
          {{ is_number(states('sensor.mirai_u1_status_word_raw')) }}

      - name: "mirai_machine_running_by_power"
        unique_id: mirai_machine_running_by_power
        icon: mdi:flash
        availability: >
          {{ is_number(states('sensor.mirai_power_w_effective')) }}
        delay_on:
          minutes: 3
        delay_off:
          minutes: 5
        state: >
          {% set p = states('sensor.mirai_power_w_effective') | float(0) %}
          {% set on_w = states('input_number.mirai_running_power_on_w') | float(450) %}
          {{ p >= on_w }}

      - name: "mirai_status_word_bit_00"
        unique_id: mirai_status_word_bit_00
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**0) != 0 }}

      - name: "mirai_status_word_bit_01"
        unique_id: mirai_status_word_bit_01
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**1) != 0 }}

      - name: "mirai_status_word_bit_02"
        unique_id: mirai_status_word_bit_02
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**2) != 0 }}

      - name: "mirai_status_word_bit_03"
        unique_id: mirai_status_word_bit_03
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**3) != 0 }}

      - name: "mirai_status_word_bit_04"
        unique_id: mirai_status_word_bit_04
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**4) != 0 }}

      - name: "mirai_status_word_bit_05"
        unique_id: mirai_status_word_bit_05
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**5) != 0 }}

      - name: "mirai_status_word_bit_06"
        unique_id: mirai_status_word_bit_06
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**6) != 0 }}

      - name: "mirai_status_word_bit_07"
        unique_id: mirai_status_word_bit_07
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**7) != 0 }}

      - name: "mirai_status_word_bit_08"
        unique_id: mirai_status_word_bit_08
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**8) != 0 }}

      - name: "mirai_status_word_bit_09"
        unique_id: mirai_status_word_bit_09
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**9) != 0 }}

      - name: "mirai_status_word_bit_10"
        unique_id: mirai_status_word_bit_10
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**10) != 0 }}

      - name: "mirai_status_word_bit_11"
        unique_id: mirai_status_word_bit_11
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**11) != 0 }}

      - name: "mirai_status_word_bit_12"
        unique_id: mirai_status_word_bit_12
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**12) != 0 }}

      - name: "mirai_status_word_bit_13"
        unique_id: mirai_status_word_bit_13
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**13) != 0 }}

      - name: "mirai_status_word_bit_14"
        unique_id: mirai_status_word_bit_14
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**14) != 0 }}

      - name: "mirai_status_word_bit_15"
        unique_id: mirai_status_word_bit_15
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {{ (states('sensor.mirai_status_word_effective') | int(0)) | bitwise_and(2**15) != 0 }}

  - sensor:
      - name: "mirai_status_bits_on"
        unique_id: mirai_status_bits_on
        icon: mdi:checkbox-multiple-marked
        availability: >
          {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on') }}
        state: >
          {% set v = states('sensor.mirai_status_word_effective') | int(0) %}
          {% set ns = namespace(bits=[]) %}
          {% for i in range(0, 16) %}
            {% if (v | bitwise_and(2**i)) != 0 %}
              {% set ns.bits = ns.bits + ['bit %02d' % i] %}
            {% endif %}
          {% endfor %}
          {{ ns.bits | join(', ') if ns.bits else 'nessun bit ON' }}

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.mirai_u1_status_word_raw
          - sensor.mirai_status_word_raw
      - platform: time_pattern
        seconds: "/30"
    binary_sensor:
      - name: "CM Modbus MIRAI ready"
        unique_id: cm_modbus_mirai_ready
        icon: mdi:check-network
        state: >
          {{ is_number(states('sensor.mirai_u1_status_word_raw')) or is_number(states('sensor.mirai_status_word_raw')) }}

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.mirai_probe_temp_a_raw
          - sensor.mirai_probe_temp_a_dup_9050_raw
          - sensor.mirai_probe_temp_a_dup_9086_raw
          - sensor.mirai_probe_temp_b_raw
          - sensor.mirai_probe_temp_b_dup_9087_raw
      - platform: time_pattern
        seconds: "/30"
    binary_sensor:
      - name: "mirai_probe_temp_a_consistent"
        unique_id: mirai_probe_temp_a_consistent
        icon: mdi:thermometer-check
        state: >
          {{ is_number(states('sensor.mirai_probe_temp_a_raw'))
             and states('sensor.mirai_probe_temp_a_raw') == states('sensor.mirai_probe_temp_a_dup_9050_raw')
             and states('sensor.mirai_probe_temp_a_raw') == states('sensor.mirai_probe_temp_a_dup_9086_raw') }}

      - name: "mirai_probe_temp_b_consistent"
        unique_id: mirai_probe_temp_b_consistent
        icon: mdi:thermometer-check
        state: >
          {{ is_number(states('sensor.mirai_probe_temp_b_raw'))
             and states('sensor.mirai_probe_temp_b_raw') == states('sensor.mirai_probe_temp_b_dup_9087_raw') }}

      - name: "mirai_pump_candidate_running"
        unique_id: mirai_pump_candidate_running
        icon: mdi:pump
        availability: >
          {{ is_number(states('sensor.mirai_probe_state_3547_raw')) }}
        state: >
          {{ states('sensor.mirai_probe_state_3547_raw') | int(0) >= 16384 }}

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - binary_sensor.cm_modbus_mirai_ready
          - sensor.mirai_status_word_effective
          - binary_sensor.mirai_machine_running_by_power
      - platform: time_pattern
        seconds: "/30"
    binary_sensor:
      - name: "mirai_machine_running"
        unique_id: mirai_machine_running
        state: >
          {% if is_state('binary_sensor.cm_modbus_mirai_ready', 'on') %}
            {% set status_state = states('sensor.mirai_status_word_effective') %}
            {% set status_valid = status_state not in ['unknown','unavailable','none','None',''] %}
            {% set bit01 = (status_state | int(0)) | bitwise_and(2**1) != 0 %}
            {% set p_on = is_state('binary_sensor.mirai_machine_running_by_power', 'on') %}
            {{ (status_valid and bit01) or p_on }}
          {% elif is_state('binary_sensor.mirai_machine_running_by_power', 'on') %}
            true
          {% elif is_state('binary_sensor.mirai_machine_running_by_power', 'off') %}
            false
          {% else %}
            unknown
          {% endif %}

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.mirai_u1_status_word_raw
          - sensor.mirai_status_word_raw
          - sensor.mirai_u1_status_code_raw
          - sensor.mirai_status_code_raw
          - sensor.mirai_u1_fault_code_raw
          - sensor.mirai_fault_code_raw
      - platform: time_pattern
        seconds: "/30"
    sensor:
      - name: "mirai_status_word_effective"
        unique_id: mirai_status_word_effective
        icon: mdi:counter
        availability: >
          {{ is_number(states('sensor.mirai_u1_status_word_raw')) or is_number(states('sensor.mirai_status_word_raw')) }}
        state: >
          {% if is_number(states('sensor.mirai_u1_status_word_raw')) %}
            {{ states('sensor.mirai_u1_status_word_raw') | int(0) }}
          {% elif is_number(states('sensor.mirai_status_word_raw')) %}
            {{ states('sensor.mirai_status_word_raw') | int(0) }}
          {% endif %}

      - name: "mirai_status_code_effective"
        unique_id: mirai_status_code_effective
        icon: mdi:counter
        availability: >
          {{ is_number(states('sensor.mirai_u1_status_code_raw')) or is_number(states('sensor.mirai_status_code_raw')) }}
        state: >
          {% if is_number(states('sensor.mirai_u1_status_code_raw')) %}
            {{ states('sensor.mirai_u1_status_code_raw') | int(0) }}
          {% elif is_number(states('sensor.mirai_status_code_raw')) %}
            {{ states('sensor.mirai_status_code_raw') | int(0) }}
          {% endif %}

      - name: "mirai_fault_code_effective"
        unique_id: mirai_fault_code_effective
        icon: mdi:counter
        availability: >
          {{ is_number(states('sensor.mirai_u1_fault_code_raw')) or is_number(states('sensor.mirai_fault_code_raw')) }}
        state: >
          {% if is_number(states('sensor.mirai_u1_fault_code_raw')) %}
            {{ states('sensor.mirai_u1_fault_code_raw') | int(0) }}
          {% elif is_number(states('sensor.mirai_fault_code_raw')) %}
            {{ states('sensor.mirai_fault_code_raw') | int(0) }}
          {% endif %}

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.mirai_power_w
          - sensor.sensor_grid_power_w
      - platform: time_pattern
        seconds: "/30"
    sensor:
      - name: "mirai_power_w_effective"
        unique_id: mirai_power_w_effective
        icon: mdi:flash
        unit_of_measurement: "W"
        state_class: measurement
        device_class: power
        availability: >
          {{ is_number(states('sensor.mirai_power_w')) or is_number(states('sensor.sensor_grid_power_w')) }}
        state: >
          {% if is_number(states('sensor.mirai_power_w')) %}
            {{ states('sensor.mirai_power_w') | float(0) }}
          {% elif is_number(states('sensor.sensor_grid_power_w')) %}
            {{ states('sensor.sensor_grid_power_w') | float(0) }}
          {% endif %}

  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - binary_sensor.cm_modbus_mirai_ready
          - binary_sensor.mirai_machine_running
          - binary_sensor.mirai_machine_running_by_power
          - binary_sensor.mirai_status_word_bit_01
          - sensor.mirai_power_w_effective
          - sensor.mirai_status_word_effective
          - sensor.mirai_status_bits_on
          - sensor.mirai_status_code_effective
          - sensor.mirai_fault_code_effective
          - sensor.mirai_probe_temp_a_raw
          - sensor.mirai_probe_temp_a_dup_9050_raw
          - sensor.mirai_probe_temp_a_dup_9086_raw
          - sensor.mirai_probe_temp_b_raw
          - sensor.mirai_probe_temp_b_dup_9087_raw
          - sensor.mirai_probe_temp_outdoor_raw
          - binary_sensor.mirai_probe_temp_a_consistent
          - binary_sensor.mirai_probe_temp_b_consistent
          - binary_sensor.mirai_pump_candidate_running
          - sensor.mirai_probe_counter_1015_raw
          - sensor.mirai_probe_state_3547_raw
      - platform: time_pattern
        seconds: "/30"
    sensor:
      - name: "mirai_probe_temp_a_c"
        unique_id: mirai_probe_temp_a_c
        icon: mdi:thermometer-water
        unit_of_measurement: "°C"
        state_class: measurement
        device_class: temperature
        availability: >
          {{ is_number(states('sensor.mirai_probe_temp_a_raw')) }}
        state: >
          {{ (states('sensor.mirai_probe_temp_a_raw') | float(0) / 10) | round(1) }}

      - name: "mirai_probe_temp_b_c"
        unique_id: mirai_probe_temp_b_c
        icon: mdi:thermometer-water
        unit_of_measurement: "°C"
        state_class: measurement
        device_class: temperature
        availability: >
          {{ is_number(states('sensor.mirai_probe_temp_b_raw')) }}
        state: >
          {{ (states('sensor.mirai_probe_temp_b_raw') | float(0) / 10) | round(1) }}

      - name: "mirai_probe_temp_outdoor_c"
        unique_id: mirai_probe_temp_outdoor_c
        icon: mdi:thermometer
        unit_of_measurement: "°C"
        state_class: measurement
        device_class: temperature
        availability: >
          {{ is_number(states('sensor.mirai_probe_temp_outdoor_raw')) }}
        state: >
          {{ (states('sensor.mirai_probe_temp_outdoor_raw') | float(0) / 10) | round(1) }}

      - name: "mirai_machine_state"
        unique_id: mirai_machine_state
        icon: mdi:power
        state: >
          {% if is_state('binary_sensor.mirai_machine_running', 'on') %}
            RUN
          {% elif is_state('binary_sensor.mirai_machine_running', 'off') %}
            OFF
          {% else %}
            UNKNOWN
          {% endif %}

      - name: "mirai_machine_running_source"
        unique_id: mirai_machine_running_source
        icon: mdi:source-branch
        state: >
          {% if is_state('binary_sensor.cm_modbus_mirai_ready', 'on') %}
            {% set bit01 = is_state('binary_sensor.mirai_status_word_bit_01', 'on') %}
            {% set p_on = is_state('binary_sensor.mirai_machine_running_by_power', 'on') %}
            {% if bit01 %}
              MODBUS_STATUS
            {% elif p_on %}
              POWER_OVERRIDE
            {% else %}
              MODBUS_STATUS
            {% endif %}
          {% elif is_state('binary_sensor.mirai_machine_running_by_power', 'on') or is_state('binary_sensor.mirai_machine_running_by_power', 'off') %}
            POWER_FALLBACK
          {% else %}
            UNKNOWN
          {% endif %}

      - name: "mirai_snapshot"
        unique_id: mirai_snapshot
        icon: mdi:clipboard-text
        state: >
          {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
        attributes:
          manual_unit_profile_ok: "{{ states('binary_sensor.mirai_manual_unit_profile_ok') }}"
          status_word_u1_raw: "{{ states('sensor.mirai_u1_status_word_raw') }}"
          machine_source: "{{ states('sensor.mirai_machine_running_source') }}"
          machine_running_power: "{{ states('binary_sensor.mirai_machine_running_by_power') }}"
          power_override_active: >
            {{ is_state('binary_sensor.cm_modbus_mirai_ready', 'on')
               and is_state('binary_sensor.mirai_machine_running_by_power', 'on')
               and is_state('binary_sensor.mirai_status_word_bit_01', 'off') }}
          mirai_power_w: "{{ states('sensor.mirai_power_w') }}"
          mirai_power_w_effective: "{{ states('sensor.mirai_power_w_effective') }}"
          probe_temp_a_c: "{{ states('sensor.mirai_probe_temp_a_c') }}"
          probe_temp_b_c: "{{ states('sensor.mirai_probe_temp_b_c') }}"
          probe_temp_outdoor_c: "{{ states('sensor.mirai_probe_temp_outdoor_c') }}"
          probe_temp_a_consistent: "{{ states('binary_sensor.mirai_probe_temp_a_consistent') }}"
          probe_temp_b_consistent: "{{ states('binary_sensor.mirai_probe_temp_b_consistent') }}"
          pump_candidate_running: "{{ states('binary_sensor.mirai_pump_candidate_running') }}"
          probe_counter_1015_raw: "{{ states('sensor.mirai_probe_counter_1015_raw') }}"
          probe_state_3547_raw: "{{ states('sensor.mirai_probe_state_3547_raw') }}"
          status_word_raw: "{{ states('sensor.mirai_status_word_raw') }}"
          status_word_effective: "{{ states('sensor.mirai_status_word_effective') }}"
          status_bits_on: "{{ states('sensor.mirai_status_bits_on') }}"
          status_code_raw: "{{ states('sensor.mirai_status_code_raw') }}"
          fault_code_raw: "{{ states('sensor.mirai_fault_code_raw') }}"
          status_code_effective: "{{ states('sensor.mirai_status_code_effective') }}"
          fault_code_effective: "{{ states('sensor.mirai_fault_code_effective') }}"
          runtime_profile: "status_only_unit1"
          machine_state: "{{ states('sensor.mirai_machine_state') }}"
