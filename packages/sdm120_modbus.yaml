utility_meter:
  sdm120_ch2_import_energy_daily:
    source: sensor.sdm120_ch2_import_energy_kwh_raw
    cycle: daily
  sdm120_ch2_import_energy_monthly:
    source: sensor.sdm120_ch2_import_energy_kwh_raw
    cycle: monthly

sensor:
  - platform: statistics
    name: sdm120_ch2_active_power_mean_15m
    entity_id: sensor.sdm120_ch2_active_power_w_raw
    state_characteristic: mean
    sampling_size: 200
    max_age:
      minutes: 15

  - platform: statistics
    name: sdm120_ch2_active_power_max_24h
    entity_id: sensor.sdm120_ch2_active_power_w_raw
    state_characteristic: value_max
    sampling_size: 5000
    max_age:
      hours: 24

template:
  - trigger:
      - platform: homeassistant
        event: start
      - platform: state
        entity_id:
          - sensor.sdm120_ch2_voltage_v_raw
          - sensor.sdm120_ch2_current_a_raw
          - sensor.sdm120_ch2_active_power_w_raw
          - sensor.sdm120_ch2_frequency_hz_raw
          - sensor.sdm120_ch2_power_factor_raw
          - sensor.sdm120_ch2_import_energy_kwh_raw
      - platform: time_pattern
        seconds: "/30"
    sensor:
      - name: "grid_voltage_v"
        unique_id: grid_voltage_v
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement
        availability: "{{ states('sensor.sdm120_ch2_voltage_v_raw') not in ['unknown','unavailable'] }}"
        state: "{{ states('sensor.sdm120_ch2_voltage_v_raw') }}"

      - name: "grid_current_a"
        unique_id: grid_current_a
        unit_of_measurement: "A"
        device_class: current
        state_class: measurement
        availability: "{{ states('sensor.sdm120_ch2_current_a_raw') not in ['unknown','unavailable'] }}"
        state: "{{ states('sensor.sdm120_ch2_current_a_raw') }}"

      - name: "grid_power_w"
        unique_id: grid_power_w
        unit_of_measurement: "W"
        device_class: power
        state_class: measurement
        availability: "{{ states('sensor.sdm120_ch2_active_power_w_raw') not in ['unknown','unavailable'] }}"
        state: "{{ states('sensor.sdm120_ch2_active_power_w_raw') }}"

      - name: "grid_frequency_hz"
        unique_id: grid_frequency_hz
        unit_of_measurement: "Hz"
        device_class: frequency
        state_class: measurement
        availability: "{{ states('sensor.sdm120_ch2_frequency_hz_raw') not in ['unknown','unavailable'] }}"
        state: "{{ states('sensor.sdm120_ch2_frequency_hz_raw') }}"

      - name: "grid_power_factor"
        unique_id: grid_power_factor
        availability: "{{ states('sensor.sdm120_ch2_power_factor_raw') not in ['unknown','unavailable'] }}"
        state: "{{ states('sensor.sdm120_ch2_power_factor_raw') }}"

      - name: "grid_energy_import_kwh"
        unique_id: grid_energy_import_kwh
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        availability: "{{ states('sensor.sdm120_ch2_import_energy_kwh_raw') not in ['unknown','unavailable'] }}"
        state: "{{ states('sensor.sdm120_ch2_import_energy_kwh_raw') }}"

      - name: "grid_direction"
        unique_id: grid_direction
        availability: "{{ states('sensor.sdm120_ch2_active_power_w_raw') not in ['unknown','unavailable'] }}"
        state: >-
          {% set p = states('sensor.sdm120_ch2_active_power_w_raw') | float(default=none) %}
          {% if p is not number %}
            unknown
          {% elif p > 0 %}
            import
          {% elif p < 0 %}
            export
          {% else %}
            idle
          {% endif %}

homeassistant:
  customize:
    sensor.sdm120_ch2_voltage_v_raw: {friendly_name: "SDM120 CH2 - Tensione"}
    sensor.sdm120_ch2_current_a_raw: {friendly_name: "SDM120 CH2 - Corrente"}
    sensor.sdm120_ch2_active_power_w_raw: {friendly_name: "SDM120 CH2 - Potenza attiva"}
    sensor.sdm120_ch2_apparent_power_va_raw: {friendly_name: "SDM120 CH2 - Potenza apparente"}
    sensor.sdm120_ch2_power_factor_raw: {friendly_name: "SDM120 CH2 - Fattore di potenza"}
    sensor.sdm120_ch2_frequency_hz_raw: {friendly_name: "SDM120 CH2 - Frequenza"}
    sensor.sdm120_ch2_import_energy_kwh_raw: {friendly_name: "SDM120 CH2 - Energia importata"}
    sensor.sdm120_ch2_import_energy_daily: {friendly_name: "SDM120 CH2 - kWh / giorno"}
    sensor.sdm120_ch2_import_energy_monthly: {friendly_name: "SDM120 CH2 - kWh / mese"}
    sensor.grid_voltage_v: {friendly_name: "Grid SSOT - Tensione"}
    sensor.grid_current_a: {friendly_name: "Grid SSOT - Corrente"}
    sensor.grid_power_w: {friendly_name: "Grid SSOT - Potenza attiva"}
    sensor.grid_frequency_hz: {friendly_name: "Grid SSOT - Frequenza"}
    sensor.grid_power_factor: {friendly_name: "Grid SSOT - Fattore di potenza"}
    sensor.grid_energy_import_kwh: {friendly_name: "Grid SSOT - Energia importata"}
    sensor.grid_direction: {friendly_name: "Grid SSOT - Direzione"}
