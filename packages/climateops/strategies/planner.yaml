template:
  - binary_sensor:
      - name: "ClimateOps Noncritical Loads Allowed"
        unique_id: climateops_noncritical_loads_allowed
        state: >-
          {% if is_state('input_boolean.policy_vacation_mode', 'on') %}
            false
          {% elif is_state('input_boolean.policy_enable_tariff_grid','off') %}
            true
          {% else %}
            {{ is_state('binary_sensor.policy_allow_shift_load','on') }}
          {% endif %}
        availability: >-
          {{
            states('input_boolean.policy_vacation_mode') not in ['unknown','unavailable']
            and
            states('input_boolean.policy_enable_tariff_grid') not in ['unknown','unavailable']
            and states('binary_sensor.policy_allow_shift_load') not in ['unknown','unavailable']
          }}

      - name: "ClimateOps AC Prefer Day Sustained"
        unique_id: climateops_ac_prefer_day_sustained
        state: >-
          {% set t_day = states('sensor.t_in_giorno') | float(default=none) %}
          {% set night_vals = [
            states('sensor.t_in_notte1') | float(default=none),
            states('sensor.t_in_notte2') | float(default=none),
            states('sensor.t_in_bagno') | float(default=none)
          ] | select('number') | list %}
          {% set t_night_max = (night_vals | max) if (night_vals | length > 0) else none %}
          {{
            t_day is number
            and t_night_max is number
            and t_day >= (t_night_max + 0.7)
          }}
        delay_on: "00:15:00"
        availability: >-
          {{
            states('sensor.t_in_giorno') not in ['unknown','unavailable','']
            and (
              states('sensor.t_in_notte1') not in ['unknown','unavailable','']
              or states('sensor.t_in_notte2') not in ['unknown','unavailable','']
              or states('sensor.t_in_bagno') not in ['unknown','unavailable','']
            )
          }}
        attributes:
          delta_required_c: 0.7
          confirmation_minutes: 15

      - name: "ClimateOps AC Prefer Night Sustained"
        unique_id: climateops_ac_prefer_night_sustained
        state: >-
          {% set t_day = states('sensor.t_in_giorno') | float(default=none) %}
          {% set night_vals = [
            states('sensor.t_in_notte1') | float(default=none),
            states('sensor.t_in_notte2') | float(default=none),
            states('sensor.t_in_bagno') | float(default=none)
          ] | select('number') | list %}
          {% set t_night_max = (night_vals | max) if (night_vals | length > 0) else none %}
          {{
            t_day is number
            and t_night_max is number
            and t_night_max >= (t_day + 0.7)
          }}
        delay_on: "00:15:00"
        availability: >-
          {{
            states('sensor.t_in_giorno') not in ['unknown','unavailable','']
            and (
              states('sensor.t_in_notte1') not in ['unknown','unavailable','']
              or states('sensor.t_in_notte2') not in ['unknown','unavailable','']
              or states('sensor.t_in_bagno') not in ['unknown','unavailable','']
            )
          }}
        attributes:
          delta_required_c: 0.7
          confirmation_minutes: 15

  - sensor:
      - name: "ClimateOps Planner Recommended Mode"
        unique_id: climateops_planner_recommended_mode
        state: >
          {% set zone_vals = [
            states('sensor.t_in_giorno') | float(default=none),
            states('sensor.t_in_notte1') | float(default=none),
            states('sensor.t_in_notte2') | float(default=none),
            states('sensor.t_in_bagno') | float(default=none)
          ] %}
          {% set zone_temps = zone_vals | select('number') | list %}
          {% set t_heat = states('input_number.temp_target_risc') | float(20) %}
          {% set t_cool = states('input_number.ac_cool_setpoint') | float(25) %}
          {% set t_zone_min = (zone_temps | min) if (zone_temps | length > 0) else none %}
          {% set comfort_cool_request =
            is_state('binary_sensor.ac_giorno_comfort_request','on')
            or is_state('binary_sensor.ac_notte_comfort_request','on')
          %}
          {% if t_zone_min is number and t_zone_min < t_heat %}
            HEAT
          {% elif comfort_cool_request %}
            COOL
          {% else %}
            IDLE
          {% endif %}
        availability: >
          {{
            (
              states('sensor.t_in_giorno') not in ['unknown','unavailable','']
              or states('sensor.t_in_notte1') not in ['unknown','unavailable','']
              or states('sensor.t_in_notte2') not in ['unknown','unavailable','']
              or states('sensor.t_in_bagno') not in ['unknown','unavailable','']
            )
            and states('input_number.temp_target_risc') not in ['unknown','unavailable']
            and states('input_number.ac_cool_setpoint') not in ['unknown','unavailable']
          }}

      - name: "ClimateOps Planner Reason"
        unique_id: climateops_planner_reason
        state: >
          Whole-home zone comfort demand based on temperature, humidity and dew point

      - name: "Planner Suggested Heat SP"
        unique_id: climateops_planner_suggested_heat_sp
        state: "{{ states('input_number.temp_target_risc') }}"
        availability: "{{ states('input_number.temp_target_risc') not in ['unknown','unavailable'] }}"

      - name: "Planner Suggested Cool SP"
        unique_id: climateops_planner_suggested_cool_sp
        state: "{{ states('input_number.ac_cool_setpoint') }}"
        availability: "{{ states('input_number.ac_cool_setpoint') not in ['unknown','unavailable'] }}"

      - name: "ClimateOps Hierarchy Mode"
        unique_id: climateops_hierarchy_mode
        state: >-
          {% set heat_req = is_state('binary_sensor.heating_should_run','on') or is_state('binary_sensor.climateops_request_heat','on') %}
          {% set day_req = is_state('binary_sensor.ac_giorno_comfort_request','on') %}
          {% set night_req = is_state('binary_sensor.ac_notte_comfort_request','on') %}
          {% set cool_req = day_req or night_req %}
          {% set vmc_target = states('sensor.vmc_vel_target') | int(-1) %}
          {% set vmc_boost_ok = is_state('binary_sensor.policy_allow_vmc_boost','on') %}
          {% set noncritical = is_state('binary_sensor.climateops_noncritical_loads_allowed','on') %}
          {% if heat_req %}
            HEAT
          {% elif cool_req and noncritical %}
            {% if day_req and night_req %}COOL_BOTH
            {% elif day_req %}COOL_DAY
            {% else %}COOL_NIGHT
            {% endif %}
          {% elif vmc_target == 3 and vmc_boost_ok and noncritical %}
            VENT_BOOST
          {% elif vmc_target in [1, 2] %}
            VENT_BASE
          {% else %}
            IDLE
          {% endif %}

      - name: "ClimateOps Hierarchy Reason"
        unique_id: climateops_hierarchy_reason
        state: >-
          {% set heat_req = is_state('binary_sensor.heating_should_run','on') or is_state('binary_sensor.climateops_request_heat','on') %}
          {% set day_req = is_state('binary_sensor.ac_giorno_comfort_request','on') %}
          {% set night_req = is_state('binary_sensor.ac_notte_comfort_request','on') %}
          {% set cool_req = day_req or night_req %}
          {% set vmc_target = states('sensor.vmc_vel_target') | int(-1) %}
          {% set vmc_boost_ok = is_state('binary_sensor.policy_allow_vmc_boost','on') %}
          {% set noncritical = is_state('binary_sensor.climateops_noncritical_loads_allowed','on') %}
          {% set vacation = is_state('input_boolean.policy_vacation_mode', 'on') %}
          {% if heat_req %}
            PRIORITY_HEAT
          {% elif cool_req and vacation %}
            HOLD_COOL_VACATION_MODE
          {% elif cool_req and not noncritical %}
            HOLD_COOL_POLICY_TARIFF_GRID
          {% elif day_req and night_req and noncritical %}
            PRIORITY_COOL_BOTH
          {% elif day_req and noncritical %}
            PRIORITY_COOL_DAY
          {% elif night_req and noncritical %}
            PRIORITY_COOL_NIGHT
          {% elif vmc_target == 3 and vacation %}
            HOLD_VENT_BOOST_VACATION_MODE
          {% elif vmc_target == 3 and not noncritical %}
            HOLD_VENT_BOOST_POLICY_TARIFF_GRID
          {% elif vmc_target == 3 and not vmc_boost_ok %}
            HOLD_VENT_BOOST_POLICY_BLOCK
          {% elif vmc_target == 3 and vmc_boost_ok and noncritical %}
            PRIORITY_VENT_BOOST
          {% elif vmc_target in [1, 2] %}
            PRIORITY_VENT_BASE
          {% else %}
            PRIORITY_IDLE
          {% endif %}
