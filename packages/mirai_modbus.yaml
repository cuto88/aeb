      - name: "sdm120_ch2_voltage_v_raw"
        unique_id: sdm120_ch2_voltage_v_raw
        address: 0
        input_type: input
        count: 2
        data_type: custom
        structure: ">f"
        slave: 2
        scan_interval: 30
        unit_of_measurement: "V"
        device_class: voltage
        state_class: measurement

      - name: "sdm120_ch2_current_a_raw"
