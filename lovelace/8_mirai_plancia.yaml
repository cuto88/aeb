title: "8 Mirai"
views:
  - title: "8 Mirai"
    path: 8-mirai
    icon: mdi:heat-pump
    type: sections
    max_columns: 2

    sections:
      - type: grid
        title: "Stato generale"
        cards:
          - type: entities
            show_header_toggle: false
            entities:
              - binary_sensor.mirai_machine_running
              - binary_sensor.mirai_machine_running_by_power
              - sensor.mirai_machine_state
              - sensor.mirai_machine_running_source
              - sensor.mirai_power_w
              - input_number.mirai_running_power_on_w
              - binary_sensor.mirai_manual_unit_profile_ok
              - sensor.mirai_status_word_effective
              - sensor.mirai_status_code_effective
              - sensor.mirai_fault_code_effective
              - sensor.mirai_u1_status_code_raw
              - sensor.mirai_u1_fault_code_raw
              - sensor.mirai_u1_status_word_raw
              - sensor.mirai_status_bits_on
              - sensor.mirai_probe_temp_a_c
              - sensor.mirai_probe_temp_b_c
              - sensor.mirai_probe_temp_outdoor_c
              - binary_sensor.mirai_probe_temp_a_consistent
              - binary_sensor.mirai_probe_temp_b_consistent
              - sensor.mirai_probe_counter_1015_raw
              - sensor.mirai_probe_state_3547_raw
              - input_boolean.mirai_debug_enable

      - type: grid
        title: "Diagnostica"
        cards:
          - type: entities
            title: "Diagnostica rapida"
            show_header_toggle: false
            entities:
              - binary_sensor.cm_modbus_mirai_ready
              - sensor.mirai_machine_running_source
              - binary_sensor.mirai_machine_running
              - binary_sensor.mirai_manual_unit_profile_ok
              - sensor.mirai_machine_state
              - sensor.mirai_status_word_effective
              - sensor.mirai_status_code_effective
              - sensor.mirai_fault_code_effective
              - sensor.mirai_u1_status_word_raw
              - sensor.mirai_u1_status_code_raw
              - sensor.mirai_u1_fault_code_raw
              - sensor.mirai_status_bits_on
          - type: markdown
            title: "Snapshot operativo"
            content: |-
              **Ultimo update:** `{{ states('sensor.mirai_snapshot') }}`

              **Verdetto rapido**
              - Link Modbus: `{{ states('binary_sensor.cm_modbus_mirai_ready') }}`
              - Source stato macchina: `{{ states('sensor.mirai_machine_running_source') }}`
              - Stato macchina: `{{ states('sensor.mirai_machine_state') }}`

              **Valori chiave**
              - Power W: `{{ state_attr('sensor.mirai_snapshot','mirai_power_w') }}`
              - Manual profile unit 1: `{{ state_attr('sensor.mirai_snapshot','manual_unit_profile_ok') }}`
              - Profilo runtime: `{{ state_attr('sensor.mirai_snapshot','runtime_profile') }}`
              - Status word effective: `{{ state_attr('sensor.mirai_snapshot','status_word_effective') }}`
              - Status code effective: `{{ state_attr('sensor.mirai_snapshot','status_code_effective') }}`
              - Fault code effective: `{{ state_attr('sensor.mirai_snapshot','fault_code_effective') }}`
              - Probe temp A: `{{ state_attr('sensor.mirai_snapshot','probe_temp_a_c') }}`
              - Probe temp B: `{{ state_attr('sensor.mirai_snapshot','probe_temp_b_c') }}`
              - Probe outdoor: `{{ state_attr('sensor.mirai_snapshot','probe_temp_outdoor_c') }}`
              - Probe temp A consistent: `{{ state_attr('sensor.mirai_snapshot','probe_temp_a_consistent') }}`
              - Probe temp B consistent: `{{ state_attr('sensor.mirai_snapshot','probe_temp_b_consistent') }}`
              - Probe counter 1015: `{{ state_attr('sensor.mirai_snapshot','probe_counter_1015_raw') }}`
              - Probe state 3547: `{{ state_attr('sensor.mirai_snapshot','probe_state_3547_raw') }}`
              - Status word u1/raw:
                `{{ state_attr('sensor.mirai_snapshot','status_word_u1_raw') }}`
                / `{{ state_attr('sensor.mirai_snapshot','status_word_raw') }}`

      - type: grid
        title: "History 24h"
        cards:
          - type: history-graph
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - binary_sensor.mirai_machine_running
              - binary_sensor.mirai_machine_running_by_power
              - sensor.mirai_status_word_effective
              - sensor.mirai_status_code_effective
              - sensor.mirai_fault_code_effective
