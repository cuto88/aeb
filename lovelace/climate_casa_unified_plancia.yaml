            heading: "Trend"
            icon: mdi:chart-line
          - type: history-graph
            title: "Forecast and grid 24h"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.policy_forecast_pv_next_hour_w
                name: "PV next hour W"
              - entity: sensor.policy_forecast_temp_next_hour_c
                name: "Temp next hour C"
              - entity: sensor.policy_grid_price_now
                name: "Grid price"
              - entity: sensor.policy_grid_import_w
                name: "Grid import W"
          - type: history-graph
            title: "Planner and AEB 24h"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.planner_dhw_run_reco
                name: "Planner DHW"
              - entity: sensor.climateops_aeb_mvp_mode
                name: "AEB MVP mode"
              - entity: binary_sensor.climateops_aeb_mvp_permitted
                name: "AEB MVP permitted"

  - title: "Passive House"
    path: passive-house
    icon: mdi:home-analytics
    type: sections
    max_columns: 3

    sections:
      - type: grid
        cards:
          - type: heading
            heading: "Stato rapido"
            icon: mdi:home-analytics
          - type: tile
            entity: sensor.envelope_efficiency_level
            name: "Envelope level"
            color: teal
          - type: tile
            entity: sensor.envelope_efficiency_reason
            name: "Envelope reason"
          - type: tile
            entity: sensor.envelope_retention_score
            name: "Retention score"
            color: amber
          - type: tile
            entity: sensor.envelope_solar_utilization_score
            name: "Solar utilization"
            color: orange
          - type: tile
            entity: binary_sensor.envelope_free_decay_candidate
            name: "Free decay candidate"
          - type: tile
            entity: binary_sensor.envelope_efficiency_inputs_ready
            name: "Inputs ready"
          - type: tile
            entity: sensor.solar_gain_passive_index
            name: "Solar gain index"
            color: yellow
          - type: tile
            entity: binary_sensor.close_shutters_recommended
            name: "Chiudere scuri"
            color: amber

      - type: grid
        cards:
          - type: heading
            heading: "Envelope"
            icon: mdi:gauge
          - type: entities
            title: "Envelope runtime"
            show_header_toggle: false
            entities:
