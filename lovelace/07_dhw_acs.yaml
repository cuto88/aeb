title: "7 DHW / ACS"
views:
  - title: "7 DHW / ACS"
    path: ehw
    icon: mdi:water-boiler
    type: sections
    max_columns: 2

    sections:
      - type: grid
        title: "Runtime"
        cards:
          - type: entities
            title: "Stato operativo"
            show_header_toggle: false
            entities:
              - entity: binary_sensor.cm_modbus_ehw_ready
                name: Modbus ready
              - entity: sensor.ehw_power_w
                name: Power (W)
              - entity: sensor.ehw_mapping_health
                name: Mapping health
              - entity: binary_sensor.ehw_mapping_suspect
                name: Mapping suspect
              - entity: sensor.ehw_tank_top
                name: Tank top (°C)
              - entity: sensor.ehw_tank_bottom
                name: Tank bottom (°C)
              - entity: sensor.ehw_setpoint
                name: Setpoint (°C)
          - type: entities
            title: "Ultimo aggiornamento"
            show_header_toggle: false
            entities:
              - entity: sensor.ehw_tank_top
                name: Tank top
                secondary_info: last-updated
              - entity: sensor.ehw_tank_bottom
                name: Tank bottom
                secondary_info: last-updated
              - entity: sensor.ehw_setpoint
                name: Setpoint
                secondary_info: last-updated

      - type: grid
        title: "Active policy"
        cards:
          - type: entities
            title: "AEB MVP DHW"
            show_header_toggle: false
            entities:
              - entity: input_boolean.climateops_aeb_mvp_enable
                name: AEB MVP enable
              - entity: input_boolean.climateops_aeb_mvp_dry_run
                name: AEB MVP dry-run
              - entity: sensor.climateops_aeb_mvp_mode
                name: AEB MVP mode
              - entity: sensor.climateops_aeb_mvp_reason
                name: AEB MVP reason
              - entity: binary_sensor.climateops_aeb_mvp_permitted
                name: AEB MVP permitted
              - entity: sensor.climateops_aeb_mvp_target_now
                name: Target now
              - entity: sensor.climateops_aeb_mvp_target_actual_delta_c
                name: Target-actual delta
              - entity: sensor.climateops_ehw_charge_state
                name: Charge state
              - entity: binary_sensor.climateops_aeb_mvp_energy_shift_stable
                name: Energy shift stable
              - entity: binary_sensor.climateops_dhw_shower_support_active
                name: Shower support
              - entity: binary_sensor.climateops_dhw_low_shower_probability_window
                name: Low shower probability
          - type: entities
            title: "Writer boundary"
            show_header_toggle: false
            entities:
              - entity: input_boolean.climateops_cutover_dhw
                name: DHW cutover
              - entity: input_boolean.climateops_dhw_write_enable
                name: Writer enable
              - entity: input_boolean.climateops_dhw_dry_run
                name: Writer dry-run
              - entity: input_boolean.climateops_dhw_request
                name: Writer request
              - entity: input_number.climateops_dhw_requested_setpoint
                name: Requested setpoint
              - entity: input_text.climateops_dhw_write_result
                name: Write result
              - entity: input_datetime.climateops_dhw_last_write_ts
                name: Last writer ts
              - entity: input_text.climateops_aeb_mvp_last_action
                name: AEB last action
              - entity: input_datetime.climateops_aeb_mvp_last_action_ts
                name: AEB last action ts
          - type: history-graph
            title: "Policy and writer (24h)"
            hours_to_show: 24
            entities:
              - entity: sensor.climateops_aeb_mvp_target_now
                name: Target
              - entity: sensor.climateops_dhw_actual_feedback
                name: Actual
              - entity: sensor.climateops_aeb_mvp_mode
                name: Mode
              - entity: binary_sensor.climateops_aeb_mvp_permitted
                name: Permitted
          - type: history-graph
            title: "Docce proxy (7 giorni)"
            hours_to_show: 168
            refresh_interval: 300
            entities:
              - entity: binary_sensor.climateops_dhw_shower_proxy_active
                name: Shower proxy
              - entity: binary_sensor.climateops_dhw_shower_support_active
                name: Shower support
              - entity: binary_sensor.climateops_dhw_low_shower_probability_window
                name: Low probability

      - type: grid
        title: "Diagnostica"
        cards:
          - type: markdown
            title: "Ruolo plancia"
            content: |-
              Questa plancia e` il **drill-down macchina ACS/EHW**.

              Usa `9 Fieldbus` solo per forensic raw bus / mapping basso livello.
          - type: entities
            title: "Raw registers"
            show_header_toggle: false
            entities:
              - entity: binary_sensor.cm_modbus_ehw_ready
                name: Modbus ready
              - entity: sensor.ehw_mapping_health
                name: Mapping health
              - entity: binary_sensor.ehw_mapping_suspect
                name: Mapping suspect
              - entity: sensor.ehw_tank_top_raw_calc
                name: Tank top raw calc
              - entity: sensor.ehw_tank_bottom_raw_calc
                name: Tank bottom raw calc
              - entity: sensor.ehw_setpoint_raw_calc
                name: Setpoint raw calc
          - type: entities
            title: "Sonde semantiche"
            show_header_toggle: false
            entities:
              - entity: sensor.ehw_t01_inlet
                name: T01 inlet
              - entity: sensor.ehw_t04_finned_coil
                name: T04 finned coil
              - entity: sensor.ehw_t05_suction
                name: T05 suction
              - entity: sensor.ehw_t06_outlet_solar
                name: T06 outlet solar
          - type: entities
            title: "Vendor reg diagnostici"
            show_header_toggle: false
            entities:
              - entity: sensor.ehw_reg1082_solar_pump_delta_start
                name: Reg1082 delta start solar pump
              - entity: sensor.ehw_reg1088_solar_drain_valve_setpoint
                name: Reg1088 solar drain valve setpoint
              - entity: sensor.ehw_reg1089_solar_pump_stop_setpoint
                name: Reg1089 solar pump stop setpoint
              - entity: sensor.ehw_reg1106_dhw_setpoint_delta
                name: Reg1106 DHW setpoint delta
              - entity: sensor.ehw_reg1109_electric_heater_delay
                name: Reg1109 electric heater delay
              - entity: sensor.ehw_reg1255_modbus_address
                name: Reg1255 Modbus address
          - type: history-graph
            title: "Temperature e consumi EHW (24h)"
            hours_to_show: 24
            entities:
              - entity: sensor.ehw_power_w
                name: Power (W)
              - entity: sensor.ehw_tank_top
                name: Tank top (°C)
              - entity: sensor.ehw_tank_bottom
                name: Tank bottom (°C)
              - entity: sensor.ehw_setpoint
                name: Setpoint (°C)
          - type: markdown
            title: "Note"
            content: |-
              Setpoint non esposto in chiaro; cambio setpoint riflette su reg56/reg57.
