title: "Consumi Mirai+EHW+PM"
views:
  - title: "Consumi"
    path: consumi
    icon: mdi:flash
    type: sections
    max_columns: 2

    sections:
      - type: grid
        title: "Stato attuale"
        cards:
          - type: entities
            title: "Potenze istantanee"
            show_header_toggle: false
            entities:
              - entity: sensor.mirai_power_w
                name: Mirai Potenza W
              - entity: sensor.ehw_power_w
                name: EHW Potenza W
              - entity: sensor.sensor_grid_direction
                name: Direzione flusso
              - entity: sensor.ds_01_power_w
                name: ds-01 / HA host W
          - type: entities
            title: "EHW diagnostica mapping"
            show_header_toggle: false
            entities:
              - entity: sensor.ehw_mapping_health
                name: Mapping health
              - entity: binary_sensor.ehw_mapping_suspect
                name: Mapping suspect
              - entity: sensor.ehw_tank_top
                name: Tank top
              - entity: sensor.ehw_tank_bottom
                name: Tank bottom
              - entity: sensor.ehw_setpoint
                name: Setpoint
          - type: entities
            title: "ds-01 / Home Assistant host"
            show_header_toggle: false
            entities:
              - entity: switch.t34_smart_plug_interruttore_1
                name: Smart plug outlet
              - entity: sensor.ds_01_power_w
                name: Potenza
              - entity: sensor.ds_01_current_a
                name: Corrente
              - entity: sensor.ds_01_voltage_v
                name: Tensione
              - entity: sensor.ds01_energy_daily
                name: kWh / giorno
              - entity: sensor.ds01_energy_monthly
                name: kWh / mese
              - entity: sensor.ds_01_energy_total
                name: kWh totale
      - type: grid
        title: "KPI AEB (runtime)"
        cards:
          - type: entities
            title: "Indice AEB"
            show_header_toggle: false
            entities:
              - entity: binary_sensor.aeb_kpi_inputs_ready
                name: KPI inputs ready
              - entity: sensor.aeb_kpi_reason
                name: KPI reason
              - entity: sensor.aeb_self_consumption_ratio_pct
                name: Self-consumption %
              - entity: sensor.aeb_shift_effectiveness_pct
                name: Shift effectiveness %
              - entity: sensor.aeb_comfort_energy_score_pct
                name: Comfort-energy score %
              - entity: sensor.aeb_policy_activation_rate_pct
                name: Policy activation %

      - type: grid
        title: "Contatori cumulati"
        cards:
          - type: entities
            title: "Mirai (pinza A)"
            show_header_toggle: false
            entities:
              - entity: sensor.a_energia_prelevata_forward
                name: Energia prelevata
              - entity: sensor.a_energia_immessa_reverse
                name: Energia immessa
          - type: entities
            title: "EHW (pinza B)"
            show_header_toggle: false
            entities:
              - entity: sensor.b_energia_prelevata_forward
                name: Energia prelevata
              - entity: sensor.b_energia_immessa_reverse
                name: Energia immessa

      - type: grid
        title: "Andamento 24h"
        cards:
          - type: history-graph
            title: "Potenze 24h"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.mirai_power_w
                name: Mirai W
              - entity: sensor.ehw_power_w
                name: EHW W
              - entity: sensor.ds_01_power_w
                name: ds-01 W
          - type: history-graph
            title: "KPI AEB (24h)"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.aeb_self_consumption_ratio_pct
                name: Self-consumption %
              - entity: sensor.aeb_shift_effectiveness_pct
                name: Shift effectiveness %
              - entity: sensor.aeb_comfort_energy_score_pct
                name: Comfort-energy %
          - type: history-graph
            title: "ds-01 potenza 24h"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.ds_01_power_w
                name: ds-01 W

      - type: grid
        title: "Consumi giornalieri (7 giorni)"
        cards:
          - type: statistics-graph
            title: "Mirai kWh/giorno"
            chart_type: bar
            period: day
            stat_types:
              - change
            days_to_show: 7
            entities:
              - entity: sensor.a_energia_prelevata_forward
          - type: statistics-graph
            title: "EHW kWh/giorno"
            chart_type: bar
            period: day
            stat_types:
              - change
            days_to_show: 7
            entities:
              - entity: sensor.b_energia_prelevata_forward
          - type: statistics-graph
            title: "ds-01 kWh/giorno"
            chart_type: bar
            period: day
            stat_types:
              - change
            days_to_show: 7
            entities:
              - entity: sensor.ds_01_energy_total

      - type: grid
        title: "Smart Plug PM — stato attuale"
        cards:
          - type: entities
            title: "Potenze istantanee PM"
            show_header_toggle: false
            entities:
              - entity: sensor.pm1_mss310_power_w_main_channel
                name: VMC W
              - entity: sensor.pm2_mss310_power_w_main_channel
                name: Lavatrice W
              - entity: sensor.pm3_mss310_power_w_main_channel
                name: Asciugatrice W
          - type: entities
            title: "kWh oggi PM"
            show_header_toggle: false
            entities:
              - entity: sensor.pm1_energy_daily
                name: VMC kWh/giorno
              - entity: sensor.pm2_energy_daily
                name: Lavatrice kWh/giorno
              - entity: sensor.pm3_energy_daily
                name: Asciugatrice kWh/giorno
              - entity: sensor.ds01_energy_daily
                name: ds-01 kWh/giorno
          - type: entities
            title: "Robot Romeo (stima)"
            show_header_toggle: false
            entities:
              - entity: input_number.robot_romeo_baseline_kwh_daily
                name: kWh/giorno stimati
              - entity: input_number.robot_romeo_baseline_kwh_monthly
                name: kWh/mese stimati

      - type: grid
        title: "Smart Plug PM — andamento 24h"
        cards:
          - type: history-graph
            title: "Potenze PM (24h)"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.pm1_mss310_power_w_main_channel
                name: VMC W
              - entity: sensor.pm2_mss310_power_w_main_channel
                name: Lavatrice W
              - entity: sensor.pm3_mss310_power_w_main_channel
                name: Asciugatrice W
              - entity: sensor.ds_01_power_w
                name: ds-01 W
          - type: statistics-graph
            title: "Consumi PM kWh/giorno (7 giorni)"
            chart_type: bar
            period: day
            stat_types:
              - change
            days_to_show: 7
            entities:
              - entity: sensor.pm1_mss310_energy_kwh_main_channel
                name: VMC
              - entity: sensor.pm2_mss310_energy_kwh_main_channel
                name: Lavatrice
              - entity: sensor.pm3_mss310_energy_kwh_main_channel
                name: Asciugatrice
              - entity: sensor.ds_01_energy_total
                name: ds-01
