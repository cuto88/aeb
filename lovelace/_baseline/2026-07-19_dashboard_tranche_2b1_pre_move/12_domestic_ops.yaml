title: "12 Operazioni domestiche"
views:
  - title: "12 Operazioni domestiche"
    path: domestic_ops
    icon: mdi:home-lightning-bolt-outline
    type: sections
    max_columns: 3

    sections:
      - type: grid
        title: "Plancia attiva"
        cards:
          - type: markdown
            title: "Versione"
            content: |-
              **Operazioni domestiche**

              Versione plancia: `2026-05-11 italiano-v9`

              Se non vedi questa riga, stai guardando una dashboard cacheata o non aggiornata.

      - type: grid
        title: "Stato rapido"
        cards:
          - type: tile
            entity: input_boolean.domesticops_domestic_mode_enabled
            name: "Modulo domestico"
            color: green
          - type: tile
            entity: input_boolean.domesticops_notify_enabled
            name: "Notifiche"
            color: blue
          - type: tile
            entity: binary_sensor.domesticops_lavastoviglie_window_ok
            name: "Slot lavastoviglie"
            color: teal
          - type: tile
            entity: binary_sensor.domesticops_lunch_window_active
            name: "Pausa pranzo"
            color: cyan
          - type: tile
            entity: binary_sensor.domesticops_lavatrice_window_ok
            name: "Slot lavatrice"
            color: teal
          - type: tile
            entity: binary_sensor.domesticops_lavastoviglie_likely_running
            name: "Lavastoviglie probabile"
            color: purple
          - type: tile
            entity: binary_sensor.domesticops_lavatrice_running
            name: "Lavatrice in corso"
            color: blue
          - type: tile
            entity: binary_sensor.domesticops_asciugatrice_running
            name: "Asciugatrice in corso"
            color: orange
          - type: tile
            entity: binary_sensor.domesticops_drying_outdoor_good
            name: "Stesura fuori OK"
            color: amber
          - type: tile
            entity: binary_sensor.domesticops_drying_retrieval_needed
            name: "Rientro bucato"
            color: red
          - type: grid
            title: "Energia"
            columns: 2
            square: false
            cards:
              - type: button
                name: "PV Array"
                icon: mdi:solar-power
                tap_action:
                  action: navigate
                  navigation_path: /05-fv-solaredge/pv_solaredge
              - type: button
                name: "Power Runtime"
                icon: mdi:flash
                tap_action:
                  action: navigate
                  navigation_path: /06-consumi/consumi

      - type: grid
        title: "Motore decisionale"
        cards:
          - type: entities
            title: "Consigli attivi"
            show_header_toggle: false
            entities:
              - entity: sensor.domesticops_lavastoviglie_advice
                name: "Consiglio lavastoviglie"
              - entity: binary_sensor.domesticops_lavastoviglie_likely_running
                name: "Lavastoviglie probabilmente in corso"
              - entity: sensor.domesticops_laundry_drying_advice
                name: "Consiglio asciugatura"
              - entity: binary_sensor.domesticops_solar_window_active
                name: "Fascia FV 10:30-16:00"
              - entity: binary_sensor.domesticops_lunch_window_active
                name: "Pausa pranzo 11:30-14:30"
              - entity: binary_sensor.domesticops_rain_risk_lookahead
                name: "Rischio pioggia"
              - entity: sensor.domesticops_sunset_in_minutes
                name: "Minuti al tramonto"
          - type: entities
            title: "Contesto meteo / FV"
            show_header_toggle: false
            entities:
              - entity: sensor.domesticops_pv_power_w
                name: "Potenza FV W"
              - entity: sensor.domesticops_outdoor_temperature_c
                name: "Temperatura esterna"
              - entity: sensor.domesticops_outdoor_humidity
                name: "Umidita esterna"
              - entity: sensor.domesticops_wind_speed
                name: "Vento"
              - entity: sensor.domesticops_rain_lookahead_source
                name: "Sorgente pioggia"

      - type: grid
        title: "Bucato appena finito"
        cards:
          - type: entities
            title: "Asciugatura adesso"
            show_header_toggle: false
            entities:
              - entity: sensor.domesticops_drying_advice_human
                name: "Consiglio"
              - type: attribute
                entity: sensor.domesticops_drying_advice_human
                attribute: next_action
                name: "Azione"
              - type: attribute
                entity: sensor.domesticops_drying_advice_human
                attribute: bring_in_by
                name: "Rientra entro"
              - type: attribute
                entity: sensor.domesticops_drying_advice_human
                attribute: bring_in_note
                name: "Nota rientro"
              - type: attribute
                entity: sensor.domesticops_drying_advice_human
                attribute: context_note
                name: "Contesto"
              - entity: binary_sensor.domesticops_drying_outdoor_good
                name: "Stendere fuori OK"
              - entity: binary_sensor.domesticops_drying_retrieval_needed
                name: "Rientro necessario"
              - entity: sensor.domesticops_laundry_drying_advice
                name: "Codice motore"
          - type: markdown
            title: "Come leggerlo"
            content: |-
              Se la lavatrice e` appena finita, guarda qui:

              - `Consiglio`: decisione sintetica
              - `Azione`: cosa fare subito
              - `Rientra entro`: orario obiettivo con anticipo
              - `Contesto`: tipo bucato, kg carico, FV attuale

              Se vuoi l'automazione piena del flusso manuale:

              - quando stendi fuori, porta `Bucato steso fuori` su `on`
              - quando il bucato e` da gestire, lascia `Bucato da gestire` su `on`

      - type: grid
        title: "Elettrodomestici"
        cards:
          - type: entities
            title: "Lavastoviglie / lavatrice / asciugatrice"
            show_header_toggle: false
            entities:
              - entity: binary_sensor.domesticops_lavastoviglie_window_ok
                name: "Finestra lavastoviglie"
              - entity: binary_sensor.domesticops_lavastoviglie_likely_running
                name: "Lavastoviglie probabile"
              - entity: sensor.domesticops_untracked_power_w
                name: "Residuo non tracciato W"
              - type: attribute
                entity: sensor.domesticops_lavastoviglie_advice
                attribute: operational_note
                name: "Nota lavastoviglie"
              - type: attribute
                entity: sensor.domesticops_lavastoviglie_advice
                attribute: inference_note
                name: "Nota inferenza"
              - entity: binary_sensor.domesticops_lavatrice_window_ok
                name: "Finestra lavatrice"
              - entity: binary_sensor.domesticops_lavatrice_running
                name: "Lavatrice in corso"
              - entity: sensor.pm2_mss310_power_w_main_channel
                name: "Lavatrice W"
              - entity: binary_sensor.domesticops_asciugatrice_running
                name: "Asciugatrice in corso"
              - entity: sensor.pm3_mss310_power_w_main_channel
                name: "Asciugatrice W"
              - entity: input_boolean.domesticops_laundry_pending
                name: "Bucato da gestire"
              - entity: input_boolean.domesticops_laundry_outside
                name: "Bucato steso fuori"
              - entity: input_select.domesticops_laundry_type
                name: "Tipo bucato"
              - entity: input_number.domesticops_laundry_load_kg
                name: "Carico kg"
              - entity: sensor.domesticops_laundry_program_advice
                name: "Consiglio programma"
          - type: markdown
            title: "Routine operativa"
            content: |-
              Uso previsto:

              - carica lavastoviglie la sera
              - lavastoviglie preferita in pausa pranzo `11:30-14:30`
              - la fascia FV larga resta `10:30-16:00`
              - usa le finestre FV per lavatrice e, se serve, asciugatrice
              - `Lavastoviglie probabile` e` una euristica sul residuo, non una misura diretta
              - tieni `Bucato da gestire` su `on` quando c'e` un lavaggio da gestire
              - passa `Bucato steso fuori` su `on` quando hai realmente steso

      - type: grid
        title: "Programmi consigliati"
        cards:
          - type: entities
            title: "Lavatrice / asciugatrice"
            show_header_toggle: false
            entities:
              - entity: sensor.domesticops_laundry_program_advice
                name: "Consiglio sintetico"
              - type: attribute
                entity: sensor.domesticops_laundry_program_advice
                attribute: washer_program
                name: "Programma lavatrice"
              - type: attribute
                entity: sensor.domesticops_laundry_program_advice
                attribute: recommended_temperature_c
                name: "Temperatura consigliata C"
              - type: attribute
                entity: sensor.domesticops_laundry_program_advice
                attribute: washer_load_note
                name: "Nota carico lavatrice"
              - type: attribute
                entity: sensor.domesticops_laundry_program_advice
                attribute: dryer_program
                name: "Programma asciugatrice"
              - type: attribute
                entity: sensor.domesticops_laundry_program_advice
                attribute: dryer_load_note
                name: "Nota carico asciugatrice"
              - type: attribute
                entity: sensor.domesticops_laundry_program_advice
                attribute: operational_note
                name: "Nota operativa"
          - type: markdown
            title: "Base manuali"
            content: |-
              Base usata per l'advice:

              - lavatrice LG `F4WV310S* / F4WV310W*`
              - asciugatrice LG `RH90V5AV*Q`

              Regole pratiche applicate:

              - `standard_adulti`: `Eco 40-60` oppure `Misti 30-40 C`
              - `bambino`: temperatura moderata e profilo semplice
              - `sportivo`: `Speciale Sport 40 C`
              - `lenzuola`: carico dedicato
              - `asciugamani`: separati dalle lenzuola
              - evitare micro-carichi se non davvero necessario
              - asciugatrice preferibilmente in surplus FV o come completamento

      - type: grid
        title: "Casa Mercurio"
        cards:
          - type: entities
            title: "Carichi reali"
            show_header_toggle: false
            entities:
              - entity: sensor.domesticops_household_load_advice
                name: "Consiglio carico casa"
              - type: attribute
                entity: sensor.domesticops_household_load_advice
                attribute: household_note
                name: "Nota famiglia"
              - type: attribute
                entity: sensor.domesticops_household_load_advice
                attribute: washer_capacity_note
                name: "Capacita lavatrice"
              - type: attribute
                entity: sensor.domesticops_household_load_advice
                attribute: separation_rule
                name: "Regola separazione"
              - type: attribute
                entity: sensor.domesticops_household_load_advice
                attribute: child_laundry_note
                name: "Nota bucato bimbo"
          - type: entities
            title: "Detersivi e dosi"
            show_header_toggle: false
            entities:
              - entity: sensor.domesticops_detergent_advice
                name: "Consiglio detersivo"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: load_kg
                name: "Carico impostato kg"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: quick_recipe
                name: "Ricetta rapida"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: use_now
                name: "Usa ora"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: add_now
                name: "Aggiungi"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: avoid_now
                name: "Evita"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: weighing_note
                name: "Come pesarlo"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: detergent_ml
                name: "Detersivo ml"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: detergent_g
                name: "Detersivo g"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: detergent_ml_note
                name: "Nota dose"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: percarbonate_g
                name: "Percarbonato g"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: hygienizer_product
                name: "Igienizzante"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: hygienizer_qty_g
                name: "Igienizzante g"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: hygienizer_note
                name: "Nota igienizzante"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: percarbonate_note
                name: "Percarbonato"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: softener_ml
                name: "Vernel ml"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: dash_note
                name: "Dash"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: ace_gentile_note
                name: "ACE Gentile"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: citric_acid_note
                name: "Acido citrico"
              - type: attribute
                entity: sensor.domesticops_detergent_advice
                attribute: softener_note
                name: "Ammorbidente"

      - type: grid
        title: "Helper e soglie"
        cards:
          - type: entities
            title: "Abilitazioni"
            show_header_toggle: false
            entities:
              - entity: input_boolean.domesticops_domestic_mode_enabled
                name: "Modulo attivo"
              - entity: input_boolean.domesticops_notify_enabled
                name: "Notifiche attive"
              - entity: input_boolean.domesticops_laundry_pending
                name: "Bucato da gestire"
              - entity: input_boolean.domesticops_laundry_outside
                name: "Bucato steso fuori"
              - entity: input_select.domesticops_laundry_type
                name: "Tipo bucato"
              - entity: input_number.domesticops_laundry_load_kg
                name: "Carico bucato kg"
          - type: entities
            title: "Soglie energia e drying"
            show_header_toggle: false
            entities:
              - entity: input_number.domesticops_pv_surplus_min_w
                name: "Surplus FV minimo W"
              - entity: input_number.domesticops_temp_ext_min_drying
                name: "Temperatura minima asciugatura"
              - entity: input_number.domesticops_humidity_ext_max_drying
                name: "Umidita massima asciugatura"
              - entity: input_number.domesticops_humidity_ext_risk
                name: "Soglia rischio umidita"
              - entity: input_number.domesticops_sunset_warning_min
                name: "Allerta tramonto min"
              - entity: input_number.domesticops_retrieve_anticipation_min
                name: "Anticipo rientro min"
              - entity: input_number.domesticops_rain_lookahead_h
                name: "Preavviso pioggia h"

      - type: grid
        title: "Storico"
        cards:
          - type: history-graph
            title: "DomesticOps ultime 24h"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: binary_sensor.domesticops_lavastoviglie_window_ok
                name: "Lavastoviglie"
              - entity: binary_sensor.domesticops_lavatrice_window_ok
                name: "Lavatrice"
              - entity: binary_sensor.domesticops_drying_outdoor_good
                name: "Stendi fuori"
              - entity: binary_sensor.domesticops_drying_retrieval_needed
                name: "Rientro bucato"
          - type: history-graph
            title: "Contesto 24h"
            hours_to_show: 24
            refresh_interval: 120
            entities:
              - entity: sensor.domesticops_pv_power_w
                name: "FV W"
              - entity: sensor.domesticops_outdoor_temperature_c
                name: "T esterna"
              - entity: sensor.domesticops_outdoor_humidity
                name: "UR esterna"
          - type: statistics-graph
            title: "Cicli ultimi 7 giorni"
            chart_type: bar
            days_to_show: 7
            period: day
            stat_types:
              - change
            entities:
              - entity: input_number.domesticops_lavatrice_cycles_total
                name: "Lavatrici"
              - entity: input_number.domesticops_asciugatrice_cycles_total
                name: "Asciugatrici"

      - type: grid
        title: "Routine domestiche"
        cards:
          - type: markdown
            title: "Reminder schedulati"
            content: |-
              Reminder attivi nel package:

              - venerdi 18:30: pulizia bagno
              - domenica 20:30: rifiuti e check frigo
              - feriali 07:30: svuota lavastoviglie
              - ogni giorno 21:30: carica lavastoviglie
          - type: entities
            title: "Script notifica"
            show_header_toggle: false
            entities:
              - entity: script.domesticops_notify
                name: "Notifica operativa"

      - type: grid
        title: "Diagnostica e mapping"
        cards:
          - type: entities
            title: "Sorgenti effettive"
            show_header_toggle: false
            entities:
              - entity: sensor.domesticops_pv_power_w
                name: "FV canonico"
                secondary_info: last-updated
              - type: attribute
                entity: sensor.domesticops_pv_power_w
                attribute: source
                name: "Sorgente FV"
              - entity: sensor.domesticops_outdoor_temperature_c
                name: "Temperatura esterna"
                secondary_info: last-updated
              - type: attribute
                entity: sensor.domesticops_outdoor_temperature_c
                attribute: source
                name: "Sorgente temperatura"
              - entity: sensor.domesticops_outdoor_humidity
                name: "Umidita esterna"
                secondary_info: last-updated
              - type: attribute
                entity: sensor.domesticops_outdoor_humidity
                attribute: source
                name: "Sorgente umidita"
              - entity: sensor.domesticops_rain_lookahead_source
                name: "Sorgente pioggia"
          - type: entities
            title: "Entita candidate grezze"
            show_header_toggle: false
            entities:
              - entity: sensor.solaredge_potenza_attuale
                name: "SolarEdge grezzo"
              - entity: sensor.sensor_pv_power_w
                name: "LocalTuya FV grezzo"
              - entity: sensor.temperatura_esterna
                name: "Temperatura esterna grezza"
              - entity: sensor.umidita_esterna
                name: "Umidita esterna grezza"
              - entity: weather.forecast_casa
                name: "Meteo casa"
              - entity: sun.sun
                name: "Sole runtime"
