title: "10 Envelope"
views:
  - title: "10 Envelope"
    path: involucro
    icon: mdi:home-thermometer-outline
    type: sections
    max_columns: 3

    sections:
      - type: grid
        title: "Sintesi"
        cards:
          - type: tile
            entity: sensor.envelope_recommended_action
            name: "Azione ora"
          - type: tile
            entity: sensor.envelope_house_night_flush_potential
            name: "Night flush"
          - type: tile
            entity: sensor.envelope_house_passive_gain_state
            name: "Guadagno passivo"
          - type: tile
            entity: binary_sensor.envelope_house_ac_justified
            name: "AC giustificata"
          - type: tile
            entity: sensor.envelope_worst_room_name
            name: "Stanza peggiore"
          - type: tile
            entity: sensor.envelope_worst_room_overheating_risk
            name: "Rischio peggiore"
          - type: tile
            entity: sensor.envelope_rooms_shade_recommended_count
            name: "Scuri consigliati"
          - type: tile
            entity: sensor.envelope_rooms_night_flush_candidate_count
            name: "Night flush candidabili"

      - type: grid
        title: "Contesto"
        cards:
          - type: tile
            entity: sensor.envelope_outdoor_cooling_window_state
            name: "Finestra esterna"
          - type: tile
            entity: sensor.envelope_time_to_cool_window
            name: "Tempo a finestra"
          - type: tile
            entity: sensor.envelope_thermal_rebound_risk
            name: "Rimbalzo termico"
          - type: tile
            entity: binary_sensor.envelope_any_shade_applied
            name: "Scuri attivi"
          - type: tile
            entity: sensor.envelope_shade_applied_rooms_count
            name: "Stanze schermate"
          - type: tile
            entity: sensor.envelope_shade_applied_rooms
            name: "Stanze"

      - type: grid
        title: "Notifiche"
        cards:
          - type: entities
            title: "Consensi"
            show_header_toggle: false
            entities:
              - entity: input_boolean.envelope_notify_enabled
                name: "Envelope"
              - entity: input_boolean.vent_notifiche_attive
                name: "Ventilazione"
              - entity: input_boolean.climate_debug_telegram
                name: "Climate debug Telegram"
              - entity: input_boolean.domesticops_notify_enabled
                name: "DomesticOps"
          - type: markdown
            content: |
              Il canale Telegram e` comune. Qui abiliti o disabiliti solo le famiglie di messaggi.

      - type: grid
        title: "Trend"
        cards:
          - type: custom:mini-graph-card
            name: "Temperature"
            hours_to_show: 12
            points_per_hour: 2
            show:
              fill: false
            entities:
              - entity: sensor.t_in_med
                name: "Casa"
              - entity: sensor.t_out
                name: "Esterno"
              - entity: sensor.t_in_giorno
                name: "Giorno"
              - entity: sensor.t_in_notte1
                name: "Notte1"
              - entity: sensor.t_in_notte2
                name: "Notte2"
          - type: custom:mini-graph-card
            name: "Dinamica"
            hours_to_show: 12
            points_per_hour: 2
            show:
              fill: false
            entities:
              - entity: sensor.envelope_giorno_rise_rate_cph
                name: "Giorno rise"
              - entity: sensor.envelope_notte1_rise_rate_cph
                name: "Notte1 rise"
              - entity: sensor.envelope_notte2_rise_rate_cph
                name: "Notte2 rise"
              - entity: sensor.envelope_t_out_drop_rate_cph
                name: "T out drop"

      - type: grid
        title: "Zone"
        cards:
          - type: entities
            title: "Giorno"
            show_header_toggle: false
            entities:
              - entity: sensor.t_in_giorno
                name: "Temperatura"
              - entity: sensor.envelope_giorno_rise_rate_cph
                name: "Rise rate"
              - entity: sensor.envelope_giorno_overheating_risk
                name: "Rischio"
              - entity: binary_sensor.envelope_giorno_shade_recommended
                name: "Scuro consigliato"
              - entity: input_boolean.envelope_giorno_shade_applied
                name: "Scuro applicato"
              - entity: binary_sensor.envelope_giorno_night_flush_candidate
                name: "Night flush"
              - entity: binary_sensor.finestre_zona_giorno_aperte
                name: "Finestre aperte"
          - type: entities
            title: "Notte 1"
            show_header_toggle: false
            entities:
              - entity: sensor.t_in_notte1
                name: "Temperatura"
              - entity: sensor.envelope_notte1_rise_rate_cph
                name: "Rise rate"
              - entity: sensor.envelope_notte1_overheating_risk
                name: "Rischio"
              - entity: binary_sensor.envelope_notte1_shade_recommended
                name: "Scuro consigliato"
              - entity: input_boolean.envelope_notte1_shade_applied
                name: "Scuro applicato"
              - entity: binary_sensor.envelope_notte1_night_flush_candidate
                name: "Night flush"
          - type: entities
            title: "Notte 2"
            show_header_toggle: false
            entities:
              - entity: sensor.t_in_notte2
                name: "Temperatura"
              - entity: sensor.envelope_notte2_rise_rate_cph
                name: "Rise rate"
              - entity: sensor.envelope_notte2_overheating_risk
                name: "Rischio"
              - entity: binary_sensor.envelope_notte2_shade_recommended
                name: "Scuro consigliato"
              - entity: input_boolean.envelope_notte2_shade_applied
                name: "Scuro applicato"
              - entity: binary_sensor.envelope_notte2_night_flush_candidate
                name: "Night flush"
          - type: entities
            title: "Bagno"
            show_header_toggle: false
            entities:
              - entity: sensor.t_in_bagno
                name: "Temperatura"
              - entity: sensor.envelope_bagno_rise_rate_cph
                name: "Rise rate"
              - entity: sensor.envelope_bagno_overheating_risk
                name: "Rischio"
              - entity: binary_sensor.envelope_bagno_shade_recommended
                name: "Scuro consigliato"
              - entity: input_boolean.envelope_bagno_shade_applied
                name: "Scuro applicato"
              - entity: binary_sensor.envelope_bagno_night_flush_candidate
                name: "Night flush"
              - entity: binary_sensor.finestre_bagno_aperte
                name: "Finestre aperte"

